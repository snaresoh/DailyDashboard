/* ═══════════════════════════════════════════════════════
   PRECISION — Shared Data Layer & Utilities
   ═══════════════════════════════════════════════════════ */

const WORKER   = 'https://polished-pond-d9e9.chenrinan.workers.dev';
const LS_KEY   = 'precision_v1';
const CACHE_TTL = 5 * 60 * 1000;
let   MEM = { daily: null, workouts: null, ts: 0 };

/* ── CSV Parser ─────────────────────────────────────── */
function parseCSV(raw) {
  const rows = []; let i = 0, n = raw.length;
  while (i < n) {
    const row = []; let eol = false;
    while (!eol && i < n) {
      let val = '';
      if (raw[i] === '"') {
        i++;
        while (i < n) {
          if (raw[i] === '"' && raw[i+1] === '"') { val += '"'; i += 2; }
          else if (raw[i] === '"') { i++; break; }
          else val += raw[i++];
        }
      } else {
        while (i < n && raw[i] !== ',' && raw[i] !== '\r' && raw[i] !== '\n') val += raw[i++];
      }
      row.push(val.trim());
      if (i < n && raw[i] === ',') i++; else eol = true;
    }
    while (i < n && (raw[i] === '\r' || raw[i] === '\n')) i++;
    if (row.some(v => v)) rows.push(row);
  }
  if (!rows.length) return [];

  // Auto-detect header row: skip rows that don't contain "Date" in first cell
  // The Daily sheet has a description row before the actual header row
  let headerIdx = 0;
  for (let ri = 0; ri < Math.min(rows.length, 3); ri++) {
    const first = (rows[ri][0]||'').trim();
    if (first.toLowerCase() === 'date' || first === 'Date') { headerIdx = ri; break; }
  }

  const hdrs = rows[headerIdx].map(h => h.replace(/\s+/g,' ').trim());
  return rows.slice(headerIdx + 1).map(cols => {
    const o = {}; hdrs.forEach((h,j) => { o[h] = (cols[j]||'').trim(); }); return o;
  }).filter(r => {
    const v = r[hdrs[0]];
    return v && v.trim() && v.toLowerCase() !== hdrs[0].toLowerCase();
  });
}

/* ── Fetch ──────────────────────────────────────────── */
function ftch(url, ms=9000) {
  return new Promise((res,rej) => {
    const t = setTimeout(() => rej(new Error('timeout')), ms);
    fetch(url,{cache:'no-store'}).then(r=>{clearTimeout(t);res(r);}).catch(e=>{clearTimeout(t);rej(e);});
  });
}

async function loadData(force=false) {
  const now = Date.now();
  if (!force && MEM.daily && (now-MEM.ts) < CACHE_TTL) return { daily:MEM.daily, workouts:MEM.workouts };
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if (!force && stored && (now-stored.ts) < CACHE_TTL) {
      MEM = { daily:stored.daily, workouts:stored.workouts, ts:stored.ts };
      return { daily:MEM.daily, workouts:MEM.workouts };
    }
  } catch(e){}

  const [dr, wr] = await Promise.all([
    ftch(`${WORKER}?sheet=daily`),
    ftch(`${WORKER}?sheet=workouts`),
  ]);
  if (!dr.ok) throw new Error(`HTTP ${dr.status}`);
  if (!wr.ok) throw new Error(`HTTP ${wr.status}`);
  const [dt, wt] = await Promise.all([dr.text(), wr.text()]);
  MEM.daily = parseCSV(dt); MEM.workouts = parseCSV(wt); MEM.ts = now;
  try { localStorage.setItem(LS_KEY, JSON.stringify(MEM)); } catch(e){}
  return { daily:MEM.daily, workouts:MEM.workouts };
}

/* ── Field getters (handles both column naming conventions) ── */
const f = v => parseFloat(v)||0;
const getLoad  = r => f(r['Load']||r['Load(体感强度)']||0);
const getTrimp = r => f(r['TRIMP']||r['TRIMP(心肺强度)']||0);
const getCTL   = r => f(r['CTL']||r['CTL(体能)']||0);
const getATL   = r => f(r['ATL']||r['ATL(疲劳)']||0);
const getTSB   = r => f(r['TSB']||r['TSB(恢复)']||0);
const getACWR  = r => f(r['ACWR']||r['ACWR(急慢性负荷比)']||0);
const getHRV   = r => f(r['HRV']||0);
const getHRV7  = r => f(r['7天平均 HRV']||r['7天平均HRV']||0);
const getHRVR  = r => f(r['HRV Ratio']||0);
const getRHR   = r => f(r['RHR']||0);
const getSRPE  = r => f(r['单日总sRPE']||0);
const getInd   = r => (r['指示器']||'');
const getDate  = r => (r['Date']||r['date']||'').trim();

const wkDate   = r => (r['Date']||r['date']||'').trim();
const wkSport  = r => (r['Sport']||r['sport']||'');
const wkDur    = r => f(r['Duration_min']||0);
const wkLoad   = r => f(r['Load']||r['load']||0);
const wkTrimp  = r => f(r['TRIMP']||r['trimp']||0);
const wkRPE    = r => f(r['RPE']||r['rpe']||0);
const wkAvgHR  = r => f(r['Avg_HR']||0);
const wkMaxHR  = r => f(r['Max_HR']||0);

/* ── Semantic helpers ───────────────────────────────── */
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTHS_LONG  = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function fmtDateLong(s) {
  const d = new Date((s||'').replace(/\//g,'-')); if(isNaN(d)) return s;
  return `${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtMonthYear(y,m) { return `${MONTHS_LONG[m]} ${y}`; }

function formLabel(tsb) {
  if(tsb > 25)  return { label:'FRESH',        col:'#a8e063' };
  if(tsb > 5)   return { label:'OPTIMAL',      col:'#a8e063' };
  if(tsb > -10) return { label:'PRODUCTIVE',   col:'#f5d020' };
  if(tsb > -30) return { label:'OVER',         col:'#ff6b35' };
  return              { label:'OVERREACHING',  col:'#ff3b30' };
}

function acwrLabel(acwr) {
  if(!acwr)      return { label:'REST',          col:'#555' };
  if(acwr < 0.8) return { label:'LOW',           col:'#5b9cf6' };
  if(acwr <=1.3) return { label:'OPTIMAL',       col:'#a8e063' };
  if(acwr <=1.5) return { label:'HIGHINTENSITY', col:'#f5d020' };
  return              { label:'OVERREACHING',   col:'#ff3b30' };
}

function loadBucket(load) {
  if(!load) return 'rest';
  if(load < 100) return 'low';
  if(load < 400) return 'medium';
  if(load < 700) return 'high';
  return 'peak';
}

function sportIcon(sport) {
  const s = (sport||'').toLowerCase();
  if(s.includes('网球')||s.includes('tennis'))    return '🎾';
  if(s.includes('羽毛球')||s.includes('badminton'))return '🏸';
  if(s.includes('跑')||s.includes('run'))         return '🏃';
  if(s.includes('游泳')||s.includes('swim'))      return '🏊';
  if(s.includes('骑')||s.includes('bike')||s.includes('cycl')) return '🚴';
  if(s.includes('力量')||s.includes('gym')||s.includes('weight')) return '🏋️';
  if(s.includes('瑜伽')||s.includes('yoga'))      return '🧘';
  if(s.includes('滑')||s.includes('ski')||s.includes('snow')) return '⛷️';
  if(s.includes('步行')||s.includes('walk'))      return '🚶';
  return '⚡';
}

function fmtDuration(mins) {
  if(!mins) return '—';
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

function buildDateIndex(daily) {
  const idx={};
  daily.forEach(r=>{ const k=getDate(r); if(k) idx[k]=r; });
  return idx;
}

/* ── Show loading/error ─────────────────────────────── */
function showLoading(el) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><div class="spinner"></div><span>LOADING</span></div>`;
}
function showError(el, msg) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><span style="font-size:24px">⚠</span><span>${msg}</span><button onclick="location.reload()">RETRY</button></div>`;
}
function setNav(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
}

/* ── Shared Nav HTML ────────────────────────────────── */
const NAV_HTML = `<nav class="bottom-nav">

</script>

<body>
<div class="page-wrap">

  <header class="header">
    <div class="logo">
      <div class="logo-icon">P</div>
      <div class="logo-name">PRECISION</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="refreshBtn" onclick="init(true)" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115.4-4.4M20 15a9 9 0 01-15.4 4.4"/></svg>
      </button>
    </div>
  </header>

  <div id="content"><div class="state-box"><div class="spinner"></div><span>LOADING</span></div></div>

</div>
<div id="nav-placeholder"></div>

<script>
document.getElementById('nav-placeholder').innerHTML = NAV_HTML;
setNav('dashboard');

async function init(force=false) {
  const btn = document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  const el = document.getElementById('content');
  showLoading(el);
  try {
    const { daily, workouts } = await loadData(force);
    render(daily, workouts);
  } catch(e) {
    showError(el, e.message);
  } finally {
    if(btn) btn.classList.remove('spinning');
  }
}

function render(daily, workouts) {
  const el = document.getElementById('content');
  if(!daily.length){ showError(el,'No data'); return; }

  const today   = daily[daily.length-1];
  const ctl     = getCTL(today), atl = getATL(today), tsb = getTSB(today);
  const acwr    = getACWR(today), hrv = getHRV(today);
  const load    = getLoad(today), trimp = getTrimp(today);
  const form    = formLabel(tsb);
  const acwrLbl = acwrLabel(acwr);

  // 7-day window
  const now = new Date();
  const week7 = [];
  for(let d=6; d>=0; d--) {
    const dt = new Date(now); dt.setDate(now.getDate()-d);
    const key = isoDate(dt);
    const row = daily.find(r=>getDate(r)===key)||null;
    week7.push({ dt, key, row, dow:['MON','TUE','WED','THU','FRI','SAT','SUN'][(dt.getDay()+6)%7] });
  }
  const weekLoad  = week7.reduce((a,x)=>a+(x.row?getLoad(x.row):0),0);
  const weekTrimp = week7.reduce((a,x)=>a+(x.row?getTrimp(x.row):0),0);
  const maxBarLoad = Math.max(...week7.map(x=>x.row?getLoad(x.row):0),1);

  // Bar colors based on load intensity
  const barColor = load => {
    const b = loadBucket(load);
    return {rest:'#333', low:'#5b9cf6', medium:'#f5d020', high:'#ff6b35', peak:'#ff3b30'}[b];
  };

  const barsHTML = week7.map(x => {
    const v = x.row ? getLoad(x.row) : 0;
    const h = Math.max((v/maxBarLoad)*72, v>0?4:0);
    const isToday = x.key === isoDate(now);
    return `<div class="activity-bar-col">
      <div class="activity-bar-wrap">
        <div class="activity-bar" style="height:${h}px;background:${isToday?'var(--accent)':barColor(v)}"></div>
      </div>
      <div class="activity-bar-day" style="color:${isToday?'var(--accent)':'var(--muted)'}">${x.dow.slice(0,3)}</div>
    </div>`;
  }).join('');

  // Recent workouts (last 3)
  const recentW = [...workouts].reverse().slice(0,3);
  const workoutsHTML = recentW.map(w => {
    const sport = wkSport(w);
    const d = new Date((wkDate(w)||'').replace(/\//g,'-'));
    const dateStr = isNaN(d) ? wkDate(w) : `${d.toLocaleString('en',{month:'short'}).toUpperCase()} ${d.getDate()}, ${d.getFullYear()} · ${fmtDuration(wkDur(w))}`;
    const rpe = wkRPE(w), loadV = wkLoad(w);
    return `<div class="workout-card fade">
      <div class="workout-icon">${sportIcon(sport)}</div>
      <div class="workout-info">
        <div class="workout-name">${sport||'Training Session'}</div>
        <div class="workout-date">${dateStr}</div>
        <div class="workout-meta">
          ${rpe>0?`<div class="wmeta-item"><div class="wmeta-val" style="color:var(--orange)">${rpe.toFixed(1)} / 10</div><div class="wmeta-lbl">RPE</div></div>`:''}
          ${wkDur(w)>0?`<div class="wmeta-item"><div class="wmeta-val">${fmtDuration(wkDur(w))}</div><div class="wmeta-lbl">TIME</div></div>`:''}
          ${loadV>0?`<div class="wmeta-item"><div class="wmeta-val">${loadV.toFixed(0)}</div><div class="wmeta-lbl">LOAD</div></div>`:''}
        </div>
      </div>
      <div class="workout-arrow">›</div>
    </div>`;
  }).join('');

  // CTL ring (treat ~150 as max for ring display)
  const ctlMax=150, atlMax=200;
  const ctlCirc=2*Math.PI*40, atlCirc=2*Math.PI*40;
  const ctlOff  = ctlCirc*(1-Math.min(ctl/ctlMax,1));
  const atlOff  = atlCirc*(1-Math.min(atl/atlMax,1));

  el.innerHTML = `
    <div class="sec-lbl fade">PERFORMANCE STATUS <span style="float:right;color:${form.col}">${acwrLbl.label}</span></div>

    <div class="perf-card fade">
      <div class="perf-top">
        <span class="perf-form-lbl">CURRENT FORM</span>
        <span class="perf-badge" style="color:${form.col}">
          <span class="badge-dot" style="background:${form.col}"></span>
          HIGH STRAIN
        </span>
      </div>
      <div class="perf-main">
        <div class="perf-form-word" style="color:${form.col}">${form.label}</div>
        <div class="perf-tsb-block">
          <div class="perf-tsb-val" style="color:${tsb<0?'var(--red)':'var(--green)'}">${tsb>=0?'+':''}${tsb.toFixed(1)}</div>
          <div class="perf-tsb-lbl">TSB INDICATOR</div>
        </div>
      </div>
      <div class="perf-sub-row">
        <div class="perf-sub-card">
          <div class="perf-sub-lbl">ACWR</div>
          <div class="perf-sub-val" style="color:${acwrLbl.col}">${acwr>0?acwr.toFixed(1):'—'}</div>
          <div class="perf-sub-bar"><div class="perf-sub-fill" style="width:${Math.min(acwr/2*100,100)}%;background:${acwrLbl.col}"></div></div>
        </div>
        <div class="perf-sub-card">
          <div class="perf-sub-lbl">HRV</div>
          <div class="perf-sub-val" style="color:var(--blue)">${hrv>0?hrv.toFixed(0)+'ms':'—'}</div>
          <div class="perf-sub-bar"><div class="perf-sub-fill" style="width:${Math.min(hrv/80*100,100)}%;background:var(--blue)"></div></div>
        </div>
      </div>
    </div>

    <div class="rings-row fade fade-1">
      <div class="ring-card">
        <div class="ring-wrap">
          <svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="40"/>
            <circle class="ring-fg" cx="50" cy="50" r="40" stroke="#f5d020"
              stroke-dasharray="${ctlCirc.toFixed(1)}"
              stroke-dashoffset="${ctlOff.toFixed(1)}"/>
          </svg>
          <div class="ring-center">
            <div class="ring-val" style="color:#f5d020">${ctl.toFixed(0)}</div>
            <div class="ring-sub">CTL</div>
          </div>
        </div>
        <div class="ring-card-lbl">CHRONIC LOAD</div>
      </div>
      <div class="ring-card">
        <div class="ring-wrap">
          <svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="40"/>
            <circle class="ring-fg" cx="50" cy="50" r="40" stroke="var(--orange)"
              stroke-dasharray="${atlCirc.toFixed(1)}"
              stroke-dashoffset="${atlOff.toFixed(1)}"/>
          </svg>
          <div class="ring-center">
            <div class="ring-val" style="color:var(--orange)">${atl.toFixed(0)}</div>
            <div class="ring-sub">ATL</div>
          </div>
        </div>
        <div class="ring-card-lbl">ACUTE LOAD</div>
      </div>
    </div>

    <div class="sec-lbl fade fade-2" style="margin-top:4px">LAST 7 DAYS ACTIVITY</div>
    <div class="activity-card fade fade-2">
      <div class="activity-chart-wrap">${barsHTML}</div>
      <div class="activity-stats">
        <div class="act-stat">
          <div class="act-stat-val">${weekLoad.toFixed(0)}</div>
          <div class="act-stat-lbl">TOTAL LOAD</div>
        </div>
        <div class="act-stat" style="padding-left:16px">
          <div class="act-stat-val">${weekTrimp.toFixed(0)}</div>
          <div class="act-stat-lbl">TRIMP</div>
        </div>
        <div class="act-stat" style="padding-left:16px">
          <div class="act-stat-val">${week7.filter(x=>x.row&&getLoad(x.row)>0).length}</div>
          <div class="act-stat-lbl">SESSIONS</div>
        </div>
      </div>
    </div>

    <div class="recent-header fade fade-3">
      <span class="sec-lbl" style="padding:0">RECENT ACTIVITY</span>
      <a class="view-all-btn" href="logs.html">VIEW ALL</a>
    </div>
    ${workoutsHTML}
    <div style="height:8px"></div>
  `;
}

init();
</script>
</body>
</html>

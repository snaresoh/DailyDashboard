<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="训练日志"/>
  <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme:light)"/>
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme:dark)"/>
  <title>训练日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── TOKENS ── */
    :root{
      --bg:#f5f5f5; --bg2:#ebebeb; --card:#ffffff; --border:#e0e0e0; --border2:#f0f0f0;
      --text:#111111; --sub:#555555; --muted:#999999; --muted2:#cccccc;
      --accent:#111111;
      --teal:#00a878; --red:#e53935; --amber:#e07b00; --blue:#1a6ef5; --pink:#d81b7a;
      --ctl:#1a6ef5; --atl:#d81b7a; --tsb:#e53935;
      --tab-h:calc(env(safe-area-inset-bottom,0px) + 58px);
      --safe-top:env(safe-area-inset-top,44px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#0a0a0a; --bg2:#141414; --card:#1a1a1a; --border:#2a2a2a; --border2:#1e1e1e;
      --text:#f0f0f0; --sub:#aaaaaa; --muted:#666666; --muted2:#333333;
      --accent:#f0f0f0;
      --teal:#2ed9a8; --red:#ff4c4c; --amber:#ffaa44; --blue:#5b9cf6; --pink:#ff3cac;
      --ctl:#5b9cf6; --atl:#ff3cac; --tsb:#ff4c4c;
    }}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{overflow-x:hidden;touch-action:pan-y;overscroll-behavior:none}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100dvh}

    /* ── PAGES ── */
    .pages-wrap{display:flex;width:200%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .pages-wrap.no-anim{transition:none}
    .page{width:50%;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* ── HEADER ── */
    .header{
      position:sticky;top:0;z-index:60;
      padding:calc(var(--safe-top) + 8px) 20px 12px;
      display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;
      background:var(--bg);border-bottom:1px solid var(--border);
    }
    .header-left{display:flex;flex-direction:column;gap:2px}
    .h-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .h-title{font-size:22px;font-weight:300;color:var(--text);letter-spacing:-.01em;line-height:1}
    .h-stale{font-size:10px;color:var(--amber);font-family:'DM Mono',monospace;margin-top:1px}
    .h-nav{display:flex;align-items:center;gap:8px}
    .icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);cursor:pointer;transition:background .15s;user-select:none;border:none;background:transparent}
    .icon-btn:active{background:var(--border)}
    .icon-btn.spinning{animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── SCROLL ── */
    .scroll{padding:0 0 calc(var(--tab-h) + 12px);max-width:430px;margin:0 auto;width:100%;display:flex;flex-direction:column;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

    /* ── TAB BAR ── */
    .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom,0px);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:flex-start}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:8px;cursor:pointer;user-select:none}
    .tab-icon{font-size:20px;line-height:1}
    .tab-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;transition:color .15s}
    .tab-btn.active .tab-lbl{color:var(--text)}
    .tab-line{position:absolute;top:0;height:2px;background:var(--text);transition:left .3s cubic-bezier(.4,0,.2,1),width .3s}

    /* ── TODAY: SECTION ROWS (Suunto style) ── */
    .t-hero{padding:28px 20px 20px;border-bottom:1px solid var(--border)}
    .t-hero-indicator{font-size:40px;line-height:1;margin-bottom:12px}
    .t-hero-row{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
    .t-hero-num{font-family:'DM Mono',monospace;font-size:64px;font-weight:300;line-height:1;letter-spacing:-.03em;color:var(--text)}
    .t-hero-unit{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;align-self:flex-end;padding-bottom:10px}
    .t-hero-sub{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
    .t-hero-kv{display:flex;flex-direction:column;gap:1px}
    .t-hero-kv-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:400;line-height:1}
    .t-hero-kv-lbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
    .t-hero-delta{font-size:11px;font-family:'DM Mono',monospace;margin-top:2px}
    .d-up{color:var(--teal)}.d-dn{color:var(--red)}.d-flat{color:var(--muted)}

    /* body state section */
    .t-section{padding:20px 20px;border-bottom:1px solid var(--border)}
    .t-sec-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:16px}
    .t-row{display:flex;align-items:baseline;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)}
    .t-row:last-child{border-bottom:none}
    .t-row-lbl{font-size:13px;color:var(--sub);font-weight:400;letter-spacing:.01em}
    .t-row-right{display:flex;align-items:baseline;gap:8px}
    .t-row-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:400;color:var(--text);line-height:1}
    .t-row-unit{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em}
    .t-row-trend{font-size:12px;line-height:1}
    .t-row-trend.up{color:var(--teal)}.t-row-trend.dn{color:var(--red)}.t-row-trend.flat{color:var(--muted)}

    /* PMC section */
    .t-pmc{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
    .t-pmc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .t-pmc-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .rpills{display:flex;gap:6px}
    .rpill{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.04em;padding:4px 11px;border-radius:999px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;background:transparent}
    .rpill.active{background:var(--text);border-color:var(--text);color:var(--bg)}
    .t-chart-wrap{height:180px;position:relative}
    .t-pmc-legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
    .t-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
    .t-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .t-leg-bar{width:16px;height:8px;border-radius:2px;flex-shrink:0;opacity:.6}

    /* ── CALENDAR PAGE ── */
    .cal-header{padding:16px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .cal-month-nav{display:flex;align-items:center;gap:12px}
    .cal-month-lbl{font-size:17px;font-weight:400;letter-spacing:-.01em;min-width:100px;text-align:center}
    .cal-nav-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);cursor:pointer;user-select:none;transition:background .15s}
    .cal-nav-btn:active{background:var(--border)}

    .cal-grid-wrap{padding:8px 12px 0}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
    .cal-dow-cell{text-align:center;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;padding:4px 0}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-day{
      aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;cursor:pointer;
      transition:transform .1s,box-shadow .1s;position:relative;
      font-family:'DM Mono',monospace;
    }
    .cal-day:active{transform:scale(.92)}
    .cal-day.empty{cursor:default;pointer-events:none}
    .cal-day-num{font-size:13px;font-weight:400;line-height:1}
    .cal-day-dot{width:4px;height:4px;border-radius:50%;margin-top:3px;opacity:.8}
    .cal-day.today .cal-day-num{font-weight:700}
    .cal-day.today::after{content:'';position:absolute;inset:1px;border-radius:9px;border:1.5px solid var(--text);pointer-events:none}
    .cal-day.selected{box-shadow:0 0 0 2px var(--text)}

    /* load heat colors - light mode */
    .load-0{background:transparent;color:var(--muted)}
    .load-1{background:#dff0ea;color:#2a6a55}
    .load-2{background:#b5dfcd;color:#1e5542}
    .load-3{background:#7ec9ab;color:#14412f}
    .load-4{background:#4db48b;color:#0a2e1e}
    .load-5{background:#1e9e6e;color:#fff}
    .load-rest{background:var(--bg2);color:var(--muted)}
    @media(prefers-color-scheme:dark){
      .load-0{background:transparent;color:var(--muted)}
      .load-1{background:#0f2920;color:#4db48b}
      .load-2{background:#153c2c;color:#5ecb9e}
      .load-3{background:#1c5039;color:#7ed9b5}
      .load-4{background:#226344;color:#a0e8cc}
      .load-5{background:#2ed9a8;color:#0a1a12}
      .load-rest{background:#1a1a1a;color:var(--muted)}
    }

    /* ── WEEK SUMMARY ── */
    .week-summary{padding:16px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:0}
    .ws-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px}
    .ws-big-row{display:flex;gap:0;margin-bottom:2px}
    .ws-big-num{flex:1;display:flex;flex-direction:column;gap:3px;padding:0 0 14px}
    .ws-big-num+.ws-big-num{border-left:1px solid var(--border);padding-left:20px}
    .ws-num{font-family:'DM Mono',monospace;font-size:32px;font-weight:300;line-height:1;letter-spacing:-.02em}
    .ws-lbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
    .ws-analysis-row{display:flex;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid var(--border2)}
    .ws-analysis-item{display:flex;align-items:flex-start;gap:10px}
    .ws-badge{font-size:16px;line-height:1;flex-shrink:0;margin-top:1px}
    .ws-analysis-text{font-size:13px;color:var(--sub);line-height:1.5;letter-spacing:.01em}
    .ws-analysis-text strong{color:var(--text);font-weight:500}

    /* ── DAY DETAIL PANEL ── */
    .day-detail{
      position:fixed;inset:0;z-index:200;
      background:var(--bg);
      display:flex;flex-direction:column;
      transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .day-detail.open{transform:translateY(0)}
    .dd-header{
      padding:calc(var(--safe-top) + 8px) 20px 14px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;
      background:var(--bg);
    }
    .dd-title{display:flex;flex-direction:column;gap:2px}
    .dd-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .dd-date{font-size:22px;font-weight:300;color:var(--text);letter-spacing:-.01em}
    .dd-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);cursor:pointer;transition:background .15s}
    .dd-close:active{background:var(--border)}
    .dd-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px}

    /* ── STATES ── */
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;color:var(--muted);font-size:13px;text-align:center}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .75s linear infinite}
    .err{color:var(--red);max-width:280px;line-height:1.7;font-size:13px}

    .fade{animation:fadeUp .3s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div class="pages-wrap" id="pagesWrap">

  <!-- TODAY -->
  <div class="page" id="page-today">
    <header class="header">
      <div class="header-left">
        <span class="h-eyebrow">训练日志</span>
        <span class="h-title" id="hDate">—</span>
        <span class="h-stale" id="hStale" style="display:none"></span>
      </div>
      <div class="h-nav">
        <div class="icon-btn" id="refreshBtn" onclick="loadData()">↻</div>
      </div>
    </header>
    <main class="scroll" id="main">
      <div class="state"><div class="spinner"></div><span>加载数据中…</span></div>
    </main>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-cal">
    <header class="header">
      <div class="header-left">
        <span class="h-eyebrow">训练日志</span>
        <span class="h-title">日历</span>
      </div>
    </header>
    <main class="scroll" id="cal-main">
      <div class="state"><span style="color:var(--muted);font-size:13px">请先在 TODAY 加载数据</span></div>
    </main>
  </div>

</div>

<!-- TAB BAR -->
<nav class="tabbar" style="position:relative">
  <div class="tab-line" id="tabLine" style="width:50%;left:0"></div>
  <div class="tab-btn active" id="tab-today" onclick="switchTab(0)">
    <div class="tab-icon">◎</div><div class="tab-lbl">Today</div>
  </div>
  <div class="tab-btn" id="tab-cal" onclick="switchTab(1)">
    <div class="tab-icon">▦</div><div class="tab-lbl">Calendar</div>
  </div>
</nav>

<!-- DAY DETAIL PANEL -->
<div class="day-detail" id="dayDetail">
  <div class="dd-header">
    <div class="dd-title">
      <span class="dd-eyebrow">训练详情</span>
      <span class="dd-date" id="ddDate">—</span>
    </div>
    <div class="dd-close" onclick="closeDayDetail()">✕</div>
  </div>
  <div class="dd-scroll" id="ddScroll"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const WORKER_URL = 'https://polished-pond-d9e9.chenrinan.workers.dev';
const CACHE_KEY  = 'trainingCache_v2';

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let allRows = [], chartInst = null, chartRange = '30d';
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();
let rowByDate = {}; // key: YYYY-MM-DD → row

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(idx, animate=true) {
  const wrap = document.getElementById('pagesWrap');
  if (!animate) wrap.classList.add('no-anim');
  wrap.style.transform = idx===0 ? 'translateX(0)' : 'translateX(-50%)';
  if (!animate) requestAnimationFrame(()=>wrap.classList.remove('no-anim'));
  ['tab-today','tab-cal'].forEach((t,i)=>document.getElementById(t).classList.toggle('active',i===idx));
  document.getElementById('tabLine').style.left = idx===0?'0':'50%';
  if (idx===1 && allRows.length) renderCalendar();
}

// ══════════════════════════════════════════════
// CSV PARSER
// ══════════════════════════════════════════════
function parseCSV(raw){
  const rows=[];let i=0,n=raw.length;
  while(i<n){
    const row=[];let eol=false;
    while(!eol&&i<n){
      let val='';
      if(raw[i]==='"'){i++;while(i<n){if(raw[i]==='"'&&raw[i+1]==='"'){val+='"';i+=2;}else if(raw[i]==='"'){i++;break;}else val+=raw[i++];}}
      else{while(i<n&&raw[i]!==','&&raw[i]!=='\r'&&raw[i]!=='\n')val+=raw[i++];}
      row.push(val.trim());
      if(i<n&&raw[i]===',')i++;else eol=true;
    }
    while(i<n&&(raw[i]==='\r'||raw[i]==='\n'))i++;
    if(row.some(v=>v))rows.push(row);
  }
  if(!rows.length)return[];
  const hdrs=rows[0].map(h=>h.replace(/\s+/g,' ').trim());
  return rows.slice(1).map(cols=>{const o={};hdrs.forEach((h,j)=>{o[h]=(cols[j]||'').trim();});return o;}).filter(r=>r[hdrs[0]]);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const f = v => parseFloat(v)||0;
const R = (v,d=1) => v.toFixed(d);

function acwrColor(v){
  if(v<=0)return'var(--muted)';
  if(v<0.8)return'var(--blue)';
  if(v<=1.3)return'var(--teal)';
  if(v<=1.5)return'var(--amber)';
  return'var(--red)';
}

function fmtDate(s){
  if(!s)return'—';
  const d=new Date(s.replace(/\//g,'-'));if(isNaN(d))return s;
  const wk=['日','一','二','三','四','五','六'];
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} 周${wk[d.getDay()]}`;
}
function fmtShort(s){const d=new Date((s||'').replace(/\//g,'-'));if(isNaN(d))return s||'';return`${d.getMonth()+1}/${d.getDate()}`;}
function daysSince(s){const d=new Date((s||'').replace(/\//g,'-'));if(isNaN(d))return null;return Math.floor((Date.now()-d.getTime())/86400000);}
function isoDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function trend(curr,prev,dec=0){
  if(prev===null)return'';
  const d=curr-prev,e=Math.pow(10,-dec)*.5;
  if(Math.abs(d)<e)return`<span class="t-row-trend flat">—</span>`;
  return d>0?`<span class="t-row-trend up">↑</span>`:`<span class="t-row-trend dn">↓</span>`;
}

function deltaTag(curr,prev,dec=0,label='vs 昨日'){
  if(prev===null)return'';
  const d=curr-prev,e=Math.pow(10,-dec)*.5;
  if(Math.abs(d)<e)return`<span class="t-hero-delta d-flat">— ${label}</span>`;
  const s=d>0?'+':'−',cls=d>0?'d-up':'d-dn';
  return`<span class="t-hero-delta ${cls}">${s}${Math.abs(d).toFixed(dec)} ${label}</span>`;
}

function weekAvg(rows,field,upToIdx){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
  const sl=rows.slice(0,upToIdx).filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d>=mon;});
  if(!sl.length)return null;
  return sl.reduce((a,r)=>a+f(r[field]),0)/sl.length;
}

// load → heat bucket 0–5
function loadBucket(load){
  if(load===0)return'rest';
  if(load<100)return 1;
  if(load<300)return 2;
  if(load<500)return 3;
  if(load<700)return 4;
  return 5;
}

// ══════════════════════════════════════════════
// CHART
// ══════════════════════════════════════════════
function getSlice(range){
  if(range==='7d'){
    const now=new Date(),mon=new Date(now);
    mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
    const r=allRows.filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d>=mon;});
    return r.length?r:allRows.slice(-7);
  }
  if(range==='ytd'){const yr=new Date().getFullYear();const r=allRows.filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d.getFullYear()===yr;});return r.length?r:allRows;}
  return allRows.slice(-30);
}

function drawChart(range){
  chartRange=range;
  document.querySelectorAll('.rpill').forEach(p=>p.classList.toggle('active',p.dataset.range===range));
  const slice=getSlice(range);
  const labels=slice.map(r=>fmtShort(r['Date']));
  const ctlD=slice.map(r=>f(r['CTL(体能)']));
  const atlD=slice.map(r=>f(r['ATL(疲劳)']));
  const tsbD=slice.map(r=>f(r['TSB(恢复)']));

  // resolve CSS vars at runtime
  const s=getComputedStyle(document.documentElement);
  const cCTL=s.getPropertyValue('--ctl').trim();
  const cATL=s.getPropertyValue('--atl').trim();
  const cTSB=s.getPropertyValue('--tsb').trim();
  const cBorder=s.getPropertyValue('--border').trim();
  const cMuted=s.getPropertyValue('--muted').trim();
  const cBg=s.getPropertyValue('--bg').trim();

  if(chartInst)chartInst.destroy();
  const ctx=document.getElementById('pmcCanvas').getContext('2d');

  const zeroLine={id:'zeroLine',afterDraw(c){
    const{ctx:x,scales:{y}}=c;if(!y)return;
    const yZ=y.getPixelForValue(0);
    if(yZ<c.chartArea.top||yZ>c.chartArea.bottom)return;
    x.save();x.beginPath();x.moveTo(c.chartArea.left,yZ);x.lineTo(c.chartArea.right,yZ);
    x.strokeStyle=cMuted;x.lineWidth=.5;x.setLineDash([3,5]);x.stroke();x.restore();
  }};
  const lastGlow={id:'lastGlow',afterDatasetsDraw(c){
    const{ctx:x}=c;
    c.data.datasets.forEach((ds,di)=>{
      if(ds.type!=='line')return;
      const m=c.getDatasetMeta(di),last=m.data[m.data.length-1];if(!last)return;
      const{x:px,y:py}=last.getCenterPoint();
      x.save();
      x.beginPath();x.arc(px,py,5,0,Math.PI*2);x.fillStyle=ds.borderColor+'33';x.fill();
      x.beginPath();x.arc(px,py,3,0,Math.PI*2);x.fillStyle=ds.borderColor;x.shadowColor=ds.borderColor;x.shadowBlur=8;x.fill();
      x.restore();
    });
  }};

  chartInst=new Chart(ctx,{
    plugins:[zeroLine,lastGlow],
    data:{labels,datasets:[
      {type:'bar', label:'CTL',data:ctlD,backgroundColor:cCTL+'28',borderWidth:0,borderRadius:2,order:3,yAxisID:'y'},
      {type:'line',label:'ATL',data:atlD,borderColor:cATL,backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.35,order:1,yAxisID:'y'},
      {type:'line',label:'TSB',data:tsbD,borderColor:cTSB,backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.35,order:2,yAxisID:'y'},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:cBg,borderColor:cBorder,borderWidth:1,titleColor:cMuted,bodyColor:s.getPropertyValue('--text').trim(),padding:10,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:11},callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}`}}},
      scales:{
        x:{ticks:{color:cMuted,font:{family:'DM Mono',size:9},maxRotation:0,maxTicksLimit:8},grid:{color:'transparent'},border:{color:cBorder}},
        y:{ticks:{color:cMuted,font:{family:'DM Mono',size:9},maxTicksLimit:5},grid:{color:cBorder+66},border:{color:'transparent'}}
      }
    }
  });
}

// CALENDAR
// ══════════════════════════════════════════════
function renderCalendar(){
  if(!allRows.length) return;
  const el=document.getElementById('cal-main');

  // find max load for relative scaling
  const maxLoad = Math.max(...allRows.map(r=>f(r['Load(体感强度)'])),1);

  const y=calYear, m=calMonth;
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7; // Mon=0
  const daysInMonth=last.getDate();

  // build cells
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const key=isoDate(new Date(y,m,d));
    const row=rowByDate[key];
    const load=row?f(row['Load(体感强度)']):null;
    const isRest= row && load===0 && f(row['TRIMP(心肺强度)'])===0;
    const ind=row?(row['指示器']||''):'';
    const today=isoDate(new Date());

    let cls='cal-day';
    if(key===today) cls+=' today';
    if(load!==null){
      if(isRest) cls+=' load-rest';
      else{
        const bkt=loadBucket(load);
        cls+=` load-${bkt}`;
      }
    } else {
      cls+=' load-0';
    }

    const dotColor = ind.includes('🔴')?'var(--red)':ind.includes('🟡')?'var(--amber)':'transparent';

    cells+=`<div class="${cls}" onclick="openDayDetail('${key}')">
      <span class="cal-day-num">${d}</span>
      <div class="cal-day-dot" style="background:${dotColor}"></div>
    </div>`;
  }

  const monthName=`${y}年${m+1}月`;

  // week summary for displayed month
  const ws=calcWeekSummary(y,m);

  el.innerHTML=`
    <div class="cal-header fade">
      <div class="cal-month-nav">
        <div class="cal-nav-btn" onclick="calNav(-1)">‹</div>
        <span class="cal-month-lbl">${monthName}</span>
        <div class="cal-nav-btn" onclick="calNav(1)">›</div>
      </div>
    </div>

    <div class="cal-grid-wrap fade">
      <div class="cal-dow">
        ${['一','二','三','四','五','六','日'].map(d=>`<div class="cal-dow-cell">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
    </div>

    ${ws}
  `;
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

// ══════════════════════════════════════════════
// WEEK SUMMARY (full month analysis)
// ══════════════════════════════════════════════
function calcWeekSummary(y,m){
  // get all rows for this month
  const monthRows=allRows.filter(r=>{
    const d=new Date((r['Date']||'').replace(/\//g,'-'));
    return !isNaN(d)&&d.getFullYear()===y&&d.getMonth()===m;
  });
  if(!monthRows.length) return '';

  const totalLoad=monthRows.reduce((a,r)=>a+f(r['Load(体感强度)']),0);
  const totalTrimp=monthRows.reduce((a,r)=>a+f(r['TRIMP(心肺强度)']),0);
  const trainingDays=monthRows.filter(r=>f(r['Load(体感强度)'])>0).length;
  const restDays=monthRows.filter(r=>f(r['Load(体感强度)'])===0&&f(r['TRIMP(心肺强度)'])===0).length;

  const hrvVals=monthRows.map(r=>f(r['HRV'])).filter(v=>v>0);
  const avgHrv=hrvVals.length?hrvVals.reduce((a,b)=>a+b,0)/hrvVals.length:null;
  const rhrVals=monthRows.map(r=>f(r['RHR'])).filter(v=>v>0);
  const avgRhr=rhrVals.length?rhrVals.reduce((a,b)=>a+b,0)/rhrVals.length:null;

  // ATL/CTL/TSB trend across month
  const lastRow=monthRows[monthRows.length-1];
  const firstRow=monthRows[0];
  const ctlGain=f(lastRow['CTL(体能)'])-f(firstRow['CTL(体能)']);
  const tsbEnd=f(lastRow['TSB(恢复)']);

  // overload days (ACWR>1.5)
  const overloadDays=monthRows.filter(r=>f(r['ACWR(急慢性负荷比)'])>1.5).length;
  const lowHrvDays=monthRows.filter(r=>{const v=f(r['HRV Ratio']);return v>0&&v<0.85;}).length;

  // avg daily load
  const avgLoad=trainingDays>0?(totalLoad/trainingDays):0;

  // generate analysis bullets
  const bullets=[];

  // training density
  const density=trainingDays/(monthRows.length||1);
  if(density>=0.7) bullets.push({icon:'🔥',text:`本月训练 <strong>${trainingDays} 天</strong>，密度较高，注意保留足够恢复时间`});
  else if(density>=0.5) bullets.push({icon:'✅',text:`本月训练 <strong>${trainingDays} 天</strong>，训练与休息比例合理`});
  else bullets.push({icon:'📉',text:`本月训练 <strong>${trainingDays} 天</strong>，训练频率偏低，可适当增加`});

  // CTL trend
  if(ctlGain>2) bullets.push({icon:'📈',text:`体能（CTL）本月增长 <strong>+${ctlGain.toFixed(1)}</strong>，适应性提升中`});
  else if(ctlGain<-2) bullets.push({icon:'📉',text:`体能（CTL）本月下降 <strong>${ctlGain.toFixed(1)}</strong>，需要保持训练连续性`});

  // TSB status end of month
  if(tsbEnd>5) bullets.push({icon:'💤',text:`月末 TSB <strong>${tsbEnd.toFixed(1)}</strong>，当前处于超量恢复阶段，可安排大负荷训练`});
  else if(tsbEnd<-10) bullets.push({icon:'⚠️',text:`月末 TSB <strong>${tsbEnd.toFixed(1)}</strong>，累积疲劳偏高，建议安排减量周`});

  // overload risk
  if(overloadDays>3) bullets.push({icon:'🚨',text:`本月有 <strong>${overloadDays} 天</strong> ACWR 超过 1.5，受伤风险较高，建议控制单次训练负荷`});
  else if(overloadDays>0) bullets.push({icon:'⚡',text:`本月 <strong>${overloadDays} 天</strong> ACWR 偏高，整体在可控范围`});

  // HRV quality
  if(avgHrv!==null&&lowHrvDays>3) bullets.push({icon:'❤️',text:`本月有 <strong>${lowHrvDays} 天</strong> HRV Ratio 偏低（<0.85），自主神经系统压力较大`});
  else if(avgHrv!==null) bullets.push({icon:'❤️',text:`本月平均 HRV <strong>${avgHrv.toFixed(0)} ms</strong>，心率恢复状态${avgHrv>=35?'良好':'一般'}`});

  const bulletsHTML=bullets.map(b=>`
    <div class="ws-analysis-item">
      <span class="ws-badge">${b.icon}</span>
      <span class="ws-analysis-text">${b.text}</span>
    </div>`).join('');

  return`
    <div class="week-summary fade">
      <div class="ws-title">本月概览 — ${y}年${m+1}月</div>
      <div class="ws-big-row">
        <div class="ws-big-num">
          <span class="ws-num">${totalLoad.toFixed(0)}</span>
          <span class="ws-lbl">总 Load</span>
        </div>
        <div class="ws-big-num">
          <span class="ws-num">${totalTrimp.toFixed(0)}</span>
          <span class="ws-lbl">总 TRIMP</span>
        </div>
      </div>
      <div class="ws-big-row" style="margin-top:12px">
        <div class="ws-big-num">
          <span class="ws-num" style="font-size:24px">${trainingDays}<span style="font-size:14px;color:var(--muted)"> / ${monthRows.length}</span></span>
          <span class="ws-lbl">训练天数</span>
        </div>
        <div class="ws-big-num">
          <span class="ws-num" style="font-size:24px">${avgLoad.toFixed(0)}</span>
          <span class="ws-lbl">日均 Load</span>
        </div>
      </div>
      <div class="ws-analysis-row">${bulletsHTML}</div>
    </div>`;
}

        <div class="t-row"><span class="t-row-lbl">HRV</span><div class="t-row-right"><span class="t-row-val" style="color:var(--teal)">${hrv>0?hrv.toFixed(0):'—'}</span><span class="t-row-unit">ms</span></div></div>
        ${hrv7>0?`<div class="t-row"><span class="t-row-lbl">7天平均 HRV</span><div class="t-row-right"><span class="t-row-val">${hrv7.toFixed(0)}</span><span class="t-row-unit">ms</span></div></div>`:''}
        ${hrvR>0?`<div class="t-row"><span class="t-row-lbl">HRV Ratio</span><div class="t-row-right"><span class="t-row-val" style="color:${hrvR>=1?'var(--teal)':'var(--amber)'}">${R(hrvR,2)}</span></div></div>`:''}
      </div>
    `;
  }
  panel.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDayDetail(){
  document.getElementById('dayDetail').classList.remove('open');
  document.body.style.overflow='';
}

// ══════════════════════════════════════════════
// CACHE + LOAD
// ══════════════════════════════════════════════
function saveCache(t){try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),csv:t}));}catch(e){}}
function loadCache(){try{const d=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');return d?d.csv:null;}catch(e){return null;}}

function fetchWithTimeout(url,ms=8000){
  return new Promise((res,rej)=>{
    const t=setTimeout(()=>rej(new Error('请求超时')),ms);
    fetch(url,{cache:'no-store'}).then(r=>{clearTimeout(t);res(r);}).catch(e=>{clearTimeout(t);rej(e);});
  });
}

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML=`<div class="state"><div class="spinner"></div><span>加载数据中…</span></div>`;
  try{
    const res=await fetchWithTimeout(WORKER_URL);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(!text||text.length<10)throw new Error('数据为空');
    saveCache(text);render(parseCSV(text));
  }catch(e){
    const cached=loadCache();
    if(cached){
      render(parseCSV(cached));
      const s=document.getElementById('hStale');
      s.textContent='离线模式 · 显示上次缓存';s.style.display='block';
    }else{
      document.getElementById('main').innerHTML=`
        <div class="state"><span class="err">加载失败<br><br>${e.message}</span>
        <button onclick="loadData()" style="margin-top:8px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;">重试</button></div>`;
    }
  }finally{btn.classList.remove('spinning');}
}

loadData();
</script>

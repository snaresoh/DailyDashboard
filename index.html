<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="训练日志" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>训练日志</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:       #0d0d0d;
      --card:     #161616;
      --card2:    #1e1e1e;
      --border:   #272727;
      --text:     #efefef;
      --muted:    #666;
      --muted2:   #444;
      --pink:     #ff3cac;
      --red:      #ff4444;
      --teal:     #26d0a0;
      --blue:     #5b9cf6;
      --amber:    #f5a623;
      --ctl-bar:  rgba(91,156,246,0.22);
      --ctl-line: #5b9cf6;
      --atl-line: #ff3cac;
      --tsb-line: #ff4444;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky; top: 0; z-index: 50;
      padding: calc(env(safe-area-inset-top, 44px) + 10px) 20px 12px;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }

    .header-eyebrow {
      font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .header-date {
      font-family: 'DM Mono', monospace;
      font-size: 17px; font-weight: 500;
      color: var(--text); letter-spacing: 0.04em;
    }

    .refresh-btn {
      width: 36px; height: 36px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--muted);
      transition: color 0.15s, background 0.15s;
      user-select: none;
    }
    .refresh-btn:active { background: #2a2a2a; color: var(--text); }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SCROLL AREA ─── */
    .scroll {
      padding: 20px 16px calc(env(safe-area-inset-bottom, 20px) + 24px);
      max-width: 430px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ─── SECTION LABEL ─── */
    .section-label {
      font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace;
      padding: 0 2px;
      margin-bottom: -6px;
    }

    /* ─── 2×2 STAT GRID ─── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px 18px;
      display: flex; flex-direction: column; gap: 6px;
      position: relative; overflow: hidden;
      transition: transform 0.12s;
    }
    .stat-card:active { transform: scale(0.97); }

    /* top accent line */
    .stat-card::after {
      content: '';
      position: absolute; top: 0; left: 16px; right: 16px; height: 1.5px;
      background: var(--accent, var(--border));
      border-radius: 0 0 2px 2px;
    }

    .stat-card.c-recovery  { --accent: var(--teal); }
    .stat-card.c-readiness { --accent: var(--blue); }
    .stat-card.c-strain    { --accent: var(--amber); }
    .stat-card.c-suggest   { --accent: var(--pink); }

    .stat-lbl {
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 36px; font-weight: 500; line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat-card.c-recovery  .stat-val { color: var(--teal); }
    .stat-card.c-readiness .stat-val { color: var(--blue); }
    .stat-card.c-strain    .stat-val { color: var(--amber); }

    /* suggestion card */
    .suggest-pill {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 2px;
    }

    .suggest-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0;
    }

    .suggest-txt {
      font-size: 17px; font-weight: 700; line-height: 1.2;
    }

    /* ─── ACWR CARD ─── */
    .acwr-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
    }

    .acwr-top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }

    .acwr-title {
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .acwr-val {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500;
      color: var(--text);
    }

    /* coloured gradient track */
    .acwr-track {
      position: relative; height: 10px;
      border-radius: 999px; overflow: visible;
      background: linear-gradient(
        to right,
        #1a3550 0%, #1a3550 30%,      /* < 0.8 low */
        #0d3d28 30%, #0d3d28 55%,      /* 0.8–1.3 green zone */
        #3d1f0d 55%, #3d1f0d 75%,      /* 1.3–1.5 caution */
        #3d0d0d 75%, #3d0d0d 100%      /* > 1.5 danger */
      );
    }

    .acwr-thumb {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,60,172,0.25), 0 0 12px rgba(255,60,172,0.5);
      transition: left 0.5s cubic-bezier(0.34,1.4,0.64,1);
    }

    .acwr-ticks {
      display: flex; justify-content: space-between;
      margin-top: 7px; padding: 0 1px;
      font-size: 9px; color: var(--muted2);
      font-family: 'DM Mono', monospace;
    }

    .acwr-zones {
      display: flex; justify-content: space-between;
      margin-top: 3px; padding: 0 1px;
      font-size: 9px; color: var(--muted2);
    }

    /* ─── PMC CHART CARD ─── */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 14px 14px;
    }

    .chart-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
    }

    .chart-title {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 500; letter-spacing: 0.06em;
    }

    .chart-sub {
      font-size: 10px; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .chart-wrap { height: 190px; position: relative; }

    canvas { display: block; }

    .chart-legend {
      display: flex; gap: 18px; justify-content: center;
      margin-top: 14px; flex-wrap: wrap;
    }

    .leg {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .leg-swatch {
      width: 20px; height: 3px; border-radius: 2px;
    }

    .leg-swatch.bar {
      height: 10px; border-radius: 3px; opacity: 0.7;
    }

    /* ─── 1×3 METRIC ROW ─── */
    .metric-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 12px 16px;
      display: flex; flex-direction: column; gap: 5px;
      position: relative; overflow: hidden;
    }

    .metric-card::after {
      content: '';
      position: absolute; top: 0; left: 10px; right: 10px; height: 1.5px;
      background: var(--accent, var(--border));
    }

    .metric-card.c-ctl { --accent: var(--ctl-line); }
    .metric-card.c-atl { --accent: var(--atl-line); }
    .metric-card.c-tsb { --accent: var(--tsb-line); }

    .metric-lbl {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); font-family: 'DM Mono', monospace;
    }

    .metric-val {
      font-family: 'DM Mono', monospace;
      font-size: 24px; font-weight: 500; line-height: 1;
    }

    .metric-card.c-ctl .metric-val { color: var(--ctl-line); }
    .metric-card.c-atl .metric-val { color: var(--atl-line); }
    .metric-card.c-tsb .metric-val { color: var(--tsb-line); }

    .metric-sub {
      font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace;
      margin-top: 1px;
    }

    /* ─── RANGE PILLS ─── */
    .rpill {
      font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: all 0.15s; user-select: none;
      background: transparent;
    }
    .rpill:active { opacity: 0.7; }
    .rpill.active { background: var(--pink); border-color: var(--pink); color: #fff; }

    /* ─── STATES ─── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 14px;
      color: var(--muted); font-size: 13px; text-align: center;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .err { color: #ff6b6b; max-width: 280px; line-height: 1.7; }

    /* ─── FADE IN ─── */
    .fade { animation: fadeUp 0.35s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade:nth-child(2) { animation-delay: 0.04s; }
    .fade:nth-child(3) { animation-delay: 0.08s; }
    .fade:nth-child(4) { animation-delay: 0.12s; }
    .fade:nth-child(5) { animation-delay: 0.16s; }
    .fade:nth-child(6) { animation-delay: 0.20s; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-eyebrow">训练日志</span>
    <span class="header-date" id="hDate">—</span>
  </div>
  <div class="refresh-btn" id="refreshBtn" onclick="loadData()">↻</div>
</header>

<main class="scroll" id="main">
  <div class="state"><div class="spinner"></div><span>加载数据中…</span></div>
</main>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsCEHLVjwVEdnJe5lH9qn6YVjDZqyXyzjvjMKddxQ3sFE6WQCn8mDuXDL7RsL8MWvfsPIvg5YDpdWC/pub?gid=1454006024&single=true&output=csv';
// ───────────────────────────────────────────────────────────────────────────

// ─── CSV PARSER (handles quoted fields with embedded commas/newlines) ───────
function parseCSV(raw) {
  const rows = []; let i = 0, n = raw.length;
  while (i < n) {
    const row = []; let eol = false;
    while (!eol && i < n) {
      let val = '';
      if (raw[i] === '"') {
        i++;
        while (i < n) {
          if (raw[i] === '"' && raw[i+1] === '"') { val += '"'; i += 2; }
          else if (raw[i] === '"') { i++; break; }
          else val += raw[i++];
        }
      } else {
        while (i < n && raw[i] !== ',' && raw[i] !== '\r' && raw[i] !== '\n') val += raw[i++];
      }
      row.push(val.trim());
      if (i < n && raw[i] === ',') i++;
      else eol = true;
    }
    while (i < n && (raw[i] === '\r' || raw[i] === '\n')) i++;
    if (row.some(v => v)) rows.push(row);
  }
  if (!rows.length) return [];
  const hdrs = rows[0].map(h => h.replace(/\s+/g,' ').trim());
  return rows.slice(1).map(cols => {
    const obj = {};
    hdrs.forEach((h, idx) => { obj[h] = (cols[idx] || '').trim(); });
    return obj;
  }).filter(r => r[hdrs[0]]);
}

function f(v) { return parseFloat(v) || 0; }

// ─── FUZZY KEY LOOKUP ───────────────────────────────────────────────────────
// Strips whitespace & brackets so "ACWR (急慢性负荷比)" matches "ACWR(急慢性负荷比)"
function getKey(row, ...candidates) {
  const norm = s => s.replace(/[\s()（）]/g, '').toLowerCase();
  for (const k of candidates) {
    if (row[k] !== undefined && row[k] !== '') return row[k];
  }
  const keys = Object.keys(row);
  for (const c of candidates) {
    const nc = norm(c);
    const found = keys.find(k => norm(k) === nc);
    if (found !== undefined && row[found] !== '') return row[found];
  }
  return '';
}
function fk(row, ...keys) { return parseFloat(getKey(row, ...keys)) || 0; }

// ─── SUGGESTION CONFIG ──────────────────────────────────────────────────────
function sgConfig(text) {
  if (!text) return { color: '#888', glow: 'rgba(136,136,136,0.3)' };
  if (text.includes('强制停训')) return { color: '#ff4444', glow: 'rgba(255,68,68,0.4)' };
  if (text.includes('强制休息')) return { color: '#ff9800', glow: 'rgba(255,152,0,0.4)' };
  if (text.includes('上高强度')) return { color: '#26d0a0', glow: 'rgba(38,208,160,0.4)' };
  if (text.includes('正常训练')) return { color: '#5b9cf6', glow: 'rgba(91,156,246,0.4)' };
  return { color: '#aaa', glow: 'rgba(170,170,170,0.3)' };
}

// ─── DATE FORMAT ─────────────────────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return '—';
  // Handle YYYY-MM-DD or YYYY/MM/DD
  const d = new Date(s.replace(/\//g,'-'));
  if (isNaN(d)) return s;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtShort(s) {
  const d = new Date((s||'').replace(/\//g,'-'));
  if (isNaN(d)) return s||'';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ─── CHART STATE ───────────────────────────────────────────────────────────
let chartInst = null;
let allRows    = [];
let chartRange = '30d'; // '7d' | '30d' | 'ytd'

function getSlice(range) {
  if (range === '7d') {
    // Mon of current week → today
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
    mon.setHours(0,0,0,0);
    const filtered = allRows.filter(r => {
      const d = new Date((r['Date']||'').replace(/\//g,'-'));
      return !isNaN(d) && d >= mon;
    });
    return filtered.length ? filtered : allRows.slice(-7);
  }
  if (range === 'ytd') {
    const yr = new Date().getFullYear();
    const filtered = allRows.filter(r => {
      const d = new Date((r['Date']||'').replace(/\//g,'-'));
      return !isNaN(d) && d.getFullYear() === yr;
    });
    return filtered.length ? filtered : allRows;
  }
  return allRows.slice(-30); // '30d'
}

function drawChart(range) {
  chartRange = range;
  document.querySelectorAll('.rpill').forEach(p =>
    p.classList.toggle('active', p.dataset.range === range)
  );
  const slice   = getSlice(range);
  const labels  = slice.map(r => fmtShort(r['Date']));
  const ctlData = slice.map(r => f(r['CTL(体能)']));
  const atlData = slice.map(r => f(r['ATL(疲劳)']));
  const tsbData = slice.map(r => f(r['TSB(恢复)']));
  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('pmcCanvas').getContext('2d');
  chartInst = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type:'bar',  label:'CTL', data:ctlData, backgroundColor:'rgba(91,156,246,0.28)', borderWidth:0, borderRadius:3, order:3, yAxisID:'y' },
        { type:'line', label:'ATL', data:atlData, borderColor:'#ff3cac', backgroundColor:'transparent', borderWidth:2, pointRadius:2.5, pointBackgroundColor:'#ff3cac', tension:0.35, order:1, yAxisID:'y' },
        { type:'line', label:'TSB', data:tsbData, borderColor:'#ff4444', backgroundColor:'transparent', borderWidth:2, pointRadius:2.5, pointBackgroundColor:'#ff4444', tension:0.35, order:2, yAxisID:'y' },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{ backgroundColor:'#1a1a1a', borderColor:'#303030', borderWidth:1, titleColor:'#888', bodyColor:'#eee', padding:10, titleFont:{ family:'DM Mono', size:10 }, bodyFont:{ family:'DM Mono', size:11 }, callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}` } }
      },
      scales:{
        x:{ ticks:{ color:'#555', font:{ family:'DM Mono', size:9 }, maxRotation:0, maxTicksLimit:8 }, grid:{ color:'rgba(255,255,255,0.03)' }, border:{ color:'#252525' } },
        y:{ ticks:{ color:'#555', font:{ family:'DM Mono', size:9 }, maxTicksLimit:6 }, grid:{ color:'rgba(255,255,255,0.04)' }, border:{ color:'#252525' } }
      }
    }
  });
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render(rows) {
  allRows = rows;   // cache for range switching
  const main = document.getElementById('main');

  if (!rows.length) {
    main.innerHTML = `<div class="state"><span class="err">表格没有数据，请检查 Sheet。</span></div>`;
    return;
  }

  // ── Today = last row ──
  const today = rows[rows.length - 1];

  // Column A–I (exact names from your sheet)
  const date      = today['Date']              || '';
  const strain    = f(today['Strain']);
  const recovery  = f(today['Recovery']);
  const readiness = f(today['Readiness']);
  const ctl       = f(today['CTL(体能)']);
  const atl       = f(today['ATL(疲劳)']);
  const tsb       = f(today['TSB(恢复)']);
  const acwr      = fk(today, 'ACWR(急慢性负荷比)', 'ACWR (急慢性负荷比)', 'ACWR');
  const sgText    = getKey(today, '今日行动指南') || today['今日行动指南'] || '';

  const sg = sgConfig(sgText);
  const todayFmt = fmtDate(date);
  document.getElementById('hDate').textContent = todayFmt;

  // ACWR thumb: your data reaches ~3.2, so map over 0–3.0 range
  const acwrPct = Math.min(Math.max((acwr / 3.0) * 100, 2), 98).toFixed(1);

  main.innerHTML = `
    <!-- 2×2 stat cards -->
    <div class="fade">
      <div class="stat-grid">

        <div class="stat-card c-strain">
          <span class="stat-lbl">Strain</span>
          <span class="stat-val">${strain.toFixed(0)}</span>
        </div>

        <div class="stat-card c-recovery">
          <span class="stat-lbl">Recovery</span>
          <span class="stat-val">${recovery.toFixed(0)}</span>
        </div>

        <div class="stat-card c-readiness">
          <span class="stat-lbl">Readiness</span>
          <span class="stat-val">${readiness.toFixed(0)}</span>
        </div>

        <div class="stat-card c-suggest">
          <span class="stat-lbl">今日建议</span>
          <div class="suggest-pill">
            <span class="suggest-dot" style="background:${sg.color};box-shadow:0 0 8px ${sg.glow}"></span>
            <span class="suggest-txt" style="color:${sg.color}">${sgText || '—'}</span>
          </div>
        </div>

      </div>
    </div>

    <!-- ACWR -->
    <div class="acwr-card fade">
      <div class="acwr-top">
        <span class="acwr-title">ACWR &nbsp;急慢性负荷比</span>
        <span class="acwr-val">${acwr.toFixed(2)}</span>
      </div>
      <div class="acwr-track">
        <div class="acwr-thumb" id="acwrThumb" style="left:${acwrPct}%"></div>
      </div>
      <div class="acwr-ticks">
        <span>0</span><span>0.75</span><span>1.5</span><span>2.25</span><span>3.0+</span>
      </div>
      <div class="acwr-zones">
        <span style="color:#2a5070">偏低</span>
        <span style="color:#1a6040">最佳区间</span>
        <span style="color:#6b3a1a">注意</span>
        <span style="color:#6b1a1a">过载</span>
      </div>
    </div>

    <!-- PMC Chart -->
    <div class="chart-card fade">
      <div class="chart-head">
        <span class="chart-title">PMC</span>
        <div style="display:flex;gap:6px;">
          <span class="rpill" data-range="7d"  onclick="drawChart('7d')">本周</span>
          <span class="rpill active" data-range="30d" onclick="drawChart('30d')">近30天</span>
          <span class="rpill" data-range="ytd" onclick="drawChart('ytd')">今年</span>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="pmcCanvas"></canvas>
      </div>
      <div class="chart-legend">
        <div class="leg"><div class="leg-swatch bar" style="background:#5b9cf6"></div>CTL 体能</div>
        <div class="leg"><div class="leg-swatch" style="background:#ff3cac"></div>ATL 疲劳</div>
        <div class="leg"><div class="leg-swatch" style="background:#ff4444"></div>TSB 恢复</div>
      </div>
    </div>

    <!-- 1×3 CTL / ATL / TSB -->
    <div class="metric-row fade">
      <div class="metric-card c-ctl">
        <span class="metric-lbl">CTL</span>
        <span class="metric-val">${ctl.toFixed(1)}</span>
        <span class="metric-sub">体能</span>
      </div>
      <div class="metric-card c-atl">
        <span class="metric-lbl">ATL</span>
        <span class="metric-val">${atl.toFixed(1)}</span>
        <span class="metric-sub">疲劳</span>
      </div>
      <div class="metric-card c-tsb">
        <span class="metric-lbl">TSB</span>
        <span class="metric-val" style="color:${tsb >= 0 ? '#26d0a0' : '#ff4444'}">${tsb.toFixed(1)}</span>
        <span class="metric-sub">恢复</span>
      </div>
    </div>
  `;

  drawChart(chartRange);
}

// ─── LOAD ──────────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  document.getElementById('main').innerHTML =
    `<div class="state"><div class="spinner"></div><span>加载数据中…</span></div>`;

  try {
    const proxy = `https://corsproxy.io/?${encodeURIComponent(CSV_URL)}`;
    const res = await fetch(proxy, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    render(rows);
  } catch (e) {
    document.getElementById('main').innerHTML = `
      <div class="state">
        <span class="err">⚠️ 加载失败<br><br>${e.message}<br><br>请检查网络或 Sheet 链接。</span>
        <button onclick="loadData()" style="
          margin-top:8px; background:var(--card2); border:1px solid var(--border);
          color:var(--text); padding:10px 28px; border-radius:12px;
          font-size:14px; cursor:pointer; font-family:'Noto Sans SC',sans-serif;">
          重试
        </button>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

loadData();
</script>
</body>
</html>

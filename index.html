<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="训练日志"/>
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)"/>
  <title>训练日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── LIGHT / DARK TOKENS ── */
    :root{
      --bg:#f2f2f7;--card:#ffffff;--card2:#e8e8ed;--border:#d1d1d6;
      --text:#1c1c1e;--muted:#8e8e93;--muted2:#c7c7cc;
      --pink:#e91e8c;--red:#ff3b30;--teal:#30b98a;--blue:#3478f6;--amber:#c8830a;
      --ctl-line:#3478f6;--atl-line:#e91e8c;--tsb-line:#ff3b30;
      --tab-h:calc(env(safe-area-inset-bottom,0px) + 60px);
      --header-bg:rgba(242,242,247,0.92);
      --tab-bg:rgba(242,242,247,0.96);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0d0d0d;--card:#1c1c1e;--card2:#2c2c2e;--border:#3a3a3c;
        --text:#f2f2f7;--muted:#8e8e93;--muted2:#3a3a3c;
        --pink:#ff3cac;--red:#ff453a;--teal:#32d296;--blue:#5b9cf6;--amber:#ffa040;
        --ctl-line:#5b9cf6;--atl-line:#ff3cac;--tsb-line:#ff453a;
        --header-bg:rgba(13,13,13,0.92);
        --tab-bg:rgba(13,13,13,0.96);
      }
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{overflow-x:hidden;touch-action:pan-y;overscroll-behavior-x:none}
    html{font-size:16px}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100dvh;overscroll-behavior:none}

    /* PAGES */
    .pages-wrap{display:flex;width:200%;transition:transform .32s cubic-bezier(.4,0,.2,1)}
    .pages-wrap.no-anim{transition:none}
    .page{width:50%;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* HEADER */
    .header{
      position:sticky;top:0;z-index:50;
      padding:calc(env(safe-area-inset-top,44px) + 10px) 20px 14px;
      background:var(--header-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .header-left{display:flex;flex-direction:column;gap:3px}
    .header-eyebrow{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .header-date{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--text);letter-spacing:0.03em}
    .header-stale{font-size:11px;color:var(--amber);font-family:'DM Mono',monospace;margin-top:1px}
    .refresh-btn{width:38px;height:38px;background:var(--card2);border:1px solid var(--border);border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);transition:color .15s,background .15s;user-select:none}
    .refresh-btn:active{background:var(--border);color:var(--text)}
    .refresh-btn.spinning{animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SCROLL */
    .scroll{padding:20px 16px calc(var(--tab-h) + 20px);max-width:430px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

    /* TAB BAR */
    .tabbar{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom,0px);
      background:var(--tab-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid var(--border);
      display:flex;align-items:flex-start;justify-content:space-around;
    }
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding-top:10px;cursor:pointer;user-select:none}
    .tab-icon{font-size:20px;line-height:1;transition:filter .15s}
    .tab-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;transition:color .15s}
    .tab-btn.active .tab-lbl{color:var(--pink)}
    .tab-btn.active .tab-icon{filter:drop-shadow(0 0 6px var(--pink))}

    /* 2x2 STAT GRID */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .stat-card{
      background:var(--card);border:1px solid var(--border);border-radius:20px;
      padding:16px 16px 18px;display:flex;flex-direction:column;gap:6px;
      position:relative;overflow:hidden;transition:transform .12s;
    }
    .stat-card:active{transform:scale(0.97)}
    .stat-card::after{content:'';position:absolute;top:0;left:18px;right:18px;height:2px;background:var(--accent,var(--border));border-radius:0 0 2px 2px}
    .stat-card.c-load{--accent:var(--amber)}.stat-card.c-trimp{--accent:var(--pink)}
    .stat-card.rest-day{opacity:0.5}
    .stat-lbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .stat-right{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
    .stat-val-lg{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;line-height:1;letter-spacing:-0.02em}
    .stat-delta{font-size:11px;font-family:'DM Mono',monospace}
    .delta-up{color:var(--teal)}.delta-down{color:var(--red)}.delta-flat{color:var(--muted)}
    .rest-badge{display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px;margin-top:3px;letter-spacing:0.06em}

    /* INDICATOR */
    .indicator-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
    .indicator-lbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .indicator-emoji{font-size:36px;line-height:1}

    /* ACWR */
    .acwr-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 20px 18px}
    .acwr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
    .acwr-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .acwr-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
    .acwr-track{position:relative;height:12px;border-radius:999px;overflow:visible;
      background:linear-gradient(to right,#1a3550 0%,#1a3550 25%,#0d3d28 25%,#0d3d28 60%,#3d1f0d 60%,#3d1f0d 80%,#3d0d0d 80%,#3d0d0d 100%)}
    @media(prefers-color-scheme:light){
      .acwr-track{background:linear-gradient(to right,#b8d4ed 0%,#b8d4ed 25%,#9dd4bc 25%,#9dd4bc 60%,#f0c88a 60%,#f0c88a 80%,#f0a09a 80%,#f0a09a 100%)}
    }
    .acwr-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 3px rgba(255,60,172,0.2),0 0 14px rgba(255,60,172,0.45);transition:left .5s cubic-bezier(.34,1.4,.64,1)}
    .acwr-ticks{display:flex;justify-content:space-between;margin-top:8px;padding:0 1px;font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace}
    .acwr-zones{display:flex;justify-content:space-between;margin-top:4px;padding:0 1px;font-size:10px}

    /* CHART */
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 16px 16px}
    .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
    .chart-title{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;letter-spacing:0.06em}
    .rpill{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.04em;padding:5px 12px;border-radius:999px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;background:transparent}
    .rpill:active{opacity:0.7}.rpill.active{background:var(--pink);border-color:var(--pink);color:#fff}
    .chart-wrap{height:200px;position:relative}
    canvas{display:block}
    .chart-legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
    .leg-swatch{width:20px;height:3px;border-radius:2px}
    .leg-swatch.bar{height:10px;border-radius:3px;opacity:0.7}

    /* 1x3 METRICS */
    .metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .metric-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 12px 16px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
    .metric-card::after{content:'';position:absolute;top:0;left:10px;right:10px;height:2px;background:var(--accent,var(--border))}
    .metric-card.c-ctl{--accent:var(--ctl-line)}.metric-card.c-atl{--accent:var(--atl-line)}.metric-card.c-tsb{--accent:var(--tsb-line)}
    .metric-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .metric-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1}
    .metric-card.c-ctl .metric-val{color:var(--ctl-line)}.metric-card.c-atl .metric-val{color:var(--atl-line)}.metric-card.c-tsb .metric-val{color:var(--tsb-line)}
    .metric-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}

    /* LOG PAGE */
    .log-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .15s}
    .log-card:active{border-color:var(--pink)}
    .log-summary{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .log-summary-left{display:flex;flex-direction:column;gap:5px;min-width:0;flex:1}

    /* single-line collapsed row */
    .log-top-row{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden}
    .log-date{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);white-space:nowrap}
    .rest-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 7px;letter-spacing:0.05em;white-space:nowrap;flex-shrink:0}
    .log-indicator{font-size:17px;line-height:1;flex-shrink:0}

    /* quick stats row */
    .log-quick-row{display:flex;align-items:center;gap:14px}
    .log-qstat{display:flex;align-items:baseline;gap:4px}
    .log-qval{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;line-height:1}
    .log-qlbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.05em;text-transform:uppercase}

    .log-summary-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .sparkline{width:52px;height:22px;flex-shrink:0}
    .log-chevron{font-size:13px;color:var(--muted);transition:transform .2s;flex-shrink:0}
    .log-card.expanded .log-chevron{transform:rotate(180deg)}

    /* expanded detail */
    .log-detail{border-top:1px solid var(--border);display:none;flex-direction:column;gap:0}
    .log-card.expanded .log-detail{display:flex}

    .log-section{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
    .log-section+.log-section{border-top:1px solid var(--border)}
    .log-section-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2px}

    .log-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .log-row.cols2{grid-template-columns:1fr 1fr}
    .log-stat{display:flex;flex-direction:column;gap:3px}
    .log-stat-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
    .log-stat-val{display:flex;align-items:baseline;gap:4px;font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1}
    .trend{font-size:12px;line-height:1;flex-shrink:0}
    .trend.up{color:var(--teal)}.trend.down{color:var(--red)}.trend.flat{color:var(--muted)}

    .cv-ctl{color:var(--ctl-line)}.cv-atl{color:var(--atl-line)}
    .cv-tsb-pos{color:var(--teal)}.cv-tsb-neg{color:var(--red)}

    /* month divider */
    .month-divider{display:flex;align-items:center;gap:10px;padding:6px 2px}
    .month-divider span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.12em;white-space:nowrap}
    .month-divider::before,.month-divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* STATES */
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;color:var(--muted);font-size:14px;text-align:center}
    .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .75s linear infinite}
    .err{color:var(--red);max-width:280px;line-height:1.7}

    /* FADE */
    .fade{animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade:nth-child(2){animation-delay:.04s}.fade:nth-child(3){animation-delay:.08s}
    .fade:nth-child(4){animation-delay:.12s}.fade:nth-child(5){animation-delay:.16s}
  </style>
</head>
<body>

<div class="pages-wrap" id="pagesWrap">

  <!-- TODAY PAGE -->
  <div class="page" id="page-today">
    <header class="header">
      <div class="header-left">
        <span class="header-eyebrow">训练日志</span>
        <span class="header-date" id="hDate">—</span>
        <span class="header-stale" id="hStale" style="display:none"></span>
      </div>
      <div class="refresh-btn" id="refreshBtn" onclick="loadData()">↻</div>
    </header>
    <main class="scroll" id="main">
      <div class="state"><div class="spinner"></div><span>加载数据中…</span></div>
    </main>
  </div>

  <!-- LOG PAGE -->
  <div class="page" id="page-log">
    <header class="header">
      <div class="header-left">
        <span class="header-eyebrow">训练日志</span>
        <span class="header-date">全部记录</span>
      </div>
    </header>
    <main class="scroll" id="log-main">
      <div class="state"><span style="color:var(--muted);font-size:13px">请先在 TODAY 加载数据</span></div>
    </main>
  </div>

</div>

<nav class="tabbar">
  <div class="tab-btn active" id="tab-today" onclick="switchTab(0)">
    <div class="tab-icon">⚡</div><div class="tab-lbl">Today</div>
  </div>
  <div class="tab-btn" id="tab-log" onclick="switchTab(1)">
    <div class="tab-icon">📋</div><div class="tab-lbl">Log</div>
  </div>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const CSV_URL   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsCEHLVjwVEdnJe5lH9qn6YVjDZqyXyzjvjMKddxQ3sFE6WQCn8mDuXDL7RsL8MWvfsPIvg5YDpdWC/pub?gid=1454006024&single=true&output=csv';
const CACHE_KEY = 'trainingCache_v1';

// ── TAB / SWIPE ─────────────────────────────────────────────────
let currentTab = 0;
function switchTab(idx, animate=true) {
  currentTab = idx;
  const wrap = document.getElementById('pagesWrap');
  if (!animate) wrap.classList.add('no-anim');
  wrap.style.transform = idx===0 ? 'translateX(0)' : 'translateX(-50%)';
  if (!animate) requestAnimationFrame(()=>wrap.classList.remove('no-anim'));
  ['tab-today','tab-log'].forEach((t,i)=>document.getElementById(t).classList.toggle('active',i===idx));
  if (idx===1 && allRows.length) renderLog(allRows);
}


// ── CSV PARSER ──────────────────────────────────────────────────
function parseCSV(raw){
  const rows=[];let i=0,n=raw.length;
  while(i<n){
    const row=[];let eol=false;
    while(!eol&&i<n){
      let val='';
      if(raw[i]==='"'){i++;while(i<n){if(raw[i]==='"'&&raw[i+1]==='"'){val+='"';i+=2;}else if(raw[i]==='"'){i++;break;}else val+=raw[i++];}}
      else{while(i<n&&raw[i]!==','&&raw[i]!=='\r'&&raw[i]!=='\n')val+=raw[i++];}
      row.push(val.trim());
      if(i<n&&raw[i]===',')i++;else eol=true;
    }
    while(i<n&&(raw[i]==='\r'||raw[i]==='\n'))i++;
    if(row.some(v=>v))rows.push(row);
  }
  if(!rows.length)return[];
  const hdrs=rows[0].map(h=>h.replace(/\s+/g,' ').trim());
  return rows.slice(1).map(cols=>{const obj={};hdrs.forEach((h,idx)=>{obj[h]=(cols[idx]||'').trim();});return obj;}).filter(r=>r[hdrs[0]]);
}

// ── HELPERS ─────────────────────────────────────────────────────
function f(v){return parseFloat(v)||0;}

function acwrColor(v){
  if(v<=0)return'var(--muted)';
  if(v<0.8)return'#5b9cf6';
  if(v<=1.3)return'#26d0a0';
  if(v<=1.5)return'#f5a623';
  return'#ff4444';
}

function fmtDate(s){
  if(!s)return'—';
  const d=new Date(s.replace(/\//g,'-'));if(isNaN(d))return s;
  const wk=['日','一','二','三','四','五','六'];
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} 周${wk[d.getDay()]}`;
}

function fmtShort(s){const d=new Date((s||'').replace(/\//g,'-'));if(isNaN(d))return s||'';return`${d.getMonth()+1}/${d.getDate()}`;}
function fmtMonthKey(s){const d=new Date((s||'').replace(/\//g,'-'));if(isNaN(d))return'?';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function fmtMonthLabel(k){const[y,m]=k.split('-');return`${y}年${parseInt(m)}月`;}
function daysSince(s){const d=new Date((s||'').replace(/\//g,'-'));if(isNaN(d))return null;return Math.floor((Date.now()-d.getTime())/86400000);}

function deltaHTML(curr,prev,dec=0,label='vs 昨日'){
  if(prev===null||prev===undefined)return'';
  const d=curr-prev,eps=Math.pow(10,-dec)*0.5,a=Math.abs(d).toFixed(dec);
  if(Math.abs(d)<eps)return`<span class="stat-delta delta-flat">— ${label}</span>`;
  const cls=d>0?'delta-up':'delta-down',sign=d>0?'+':'−';
  return`<span class="stat-delta ${cls}">${sign}${a} ${label}</span>`;
}

function trendIcon(curr,prev,dec=0){
  if(prev===null||prev===undefined)return'';
  const d=curr-prev,eps=Math.pow(10,-dec)*0.5;
  if(Math.abs(d)<eps)return'<span class="trend flat">—</span>';
  return d>0?'<span class="trend up">↑</span>':'<span class="trend down">↓</span>';
}

// week average for field, days Mon→yesterday
function weekAvg(rows,field,todayIdx){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
  const slice=rows.slice(0,todayIdx).filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d>=mon;});
  if(!slice.length)return null;
  return slice.reduce((a,r)=>a+f(r[field]),0)/slice.length;
}

// ── SPARKLINE ───────────────────────────────────────────────────
function sparkSVG(vals){
  const w=52,h=22,p=2;
  if(!vals||vals.length<2)return`<svg class="sparkline" viewBox="0 0 ${w} ${h}"></svg>`;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=p+(i/(vals.length-1))*(w-p*2);
    const y=(h-p)-((v-mn)/rng)*(h-p*2);
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const[lx,ly]=pts[pts.length-1].split(',');
  const lv=vals[vals.length-1];
  const col=lv>=0?'#26d0a0':'#ff4444';
  return`<svg class="sparkline" viewBox="0 0 ${w} ${h}" fill="none">
    <polyline points="${pts.join(' ')}" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>
    <circle cx="${lx}" cy="${ly}" r="2.5" fill="${col}"/>
  </svg>`;
}

// ── CHART STATE ─────────────────────────────────────────────────
let chartInst=null,chartRange='30d',allRows=[];

function getSlice(range){
  if(range==='7d'){
    const now=new Date(),mon=new Date(now);
    mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
    const r=allRows.filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d>=mon;});
    return r.length?r:allRows.slice(-7);
  }
  if(range==='ytd'){
    const yr=new Date().getFullYear();
    const r=allRows.filter(r=>{const d=new Date((r['Date']||'').replace(/\//g,'-'));return!isNaN(d)&&d.getFullYear()===yr;});
    return r.length?r:allRows;
  }
  return allRows.slice(-30);
}

function drawChart(range){
  chartRange=range;
  document.querySelectorAll('.rpill').forEach(p=>p.classList.toggle('active',p.dataset.range===range));
  const slice=getSlice(range);
  const labels=slice.map(r=>fmtShort(r['Date']));
  const ctlData=slice.map(r=>f(r['CTL(体能)']));
  const atlData=slice.map(r=>f(r['ATL(疲劳)']));
  const tsbData=slice.map(r=>f(r['TSB(恢复)']));
  if(chartInst)chartInst.destroy();
  const ctx=document.getElementById('pmcCanvas').getContext('2d');
  const zeroLine={id:'zeroLine',afterDraw(chart){
    const{ctx:c,scales:{y}}=chart;if(!y)return;
    const yZ=y.getPixelForValue(0);
    if(yZ<chart.chartArea.top||yZ>chart.chartArea.bottom)return;
    c.save();c.beginPath();c.moveTo(chart.chartArea.left,yZ);c.lineTo(chart.chartArea.right,yZ);
    c.strokeStyle='rgba(255,255,255,0.18)';c.lineWidth=1;c.setLineDash([4,4]);c.stroke();c.restore();
  }};
  const lastGlow={id:'lastGlow',afterDatasetsDraw(chart){
    const{ctx:c}=chart;
    chart.data.datasets.forEach((ds,di)=>{
      if(ds.type!=='line')return;
      const meta=chart.getDatasetMeta(di),last=meta.data[meta.data.length-1];if(!last)return;
      const{x,y}=last.getCenterPoint();
      c.save();
      c.beginPath();c.arc(x,y,6,0,Math.PI*2);c.fillStyle=ds.borderColor+'2a';c.fill();
      c.beginPath();c.arc(x,y,3.5,0,Math.PI*2);c.fillStyle=ds.borderColor;c.shadowColor=ds.borderColor;c.shadowBlur=8;c.fill();
      c.restore();
    });
  }};
  chartInst=new Chart(ctx,{
    plugins:[zeroLine,lastGlow],
    data:{labels,datasets:[
      {type:'bar', label:'CTL',data:ctlData,backgroundColor:'rgba(91,156,246,0.25)',borderWidth:0,borderRadius:3,order:3,yAxisID:'y'},
      {type:'line',label:'ATL',data:atlData,borderColor:'#ff3cac',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.35,order:1,yAxisID:'y'},
      {type:'line',label:'TSB',data:tsbData,borderColor:'#ff4444',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.35,order:2,yAxisID:'y'},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a1a',borderColor:'#303030',borderWidth:1,titleColor:'#888',bodyColor:'#eee',padding:10,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:11},callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}`}}},
      scales:{
        x:{ticks:{color:'#555',font:{family:'DM Mono',size:9},maxRotation:0,maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.03)'},border:{color:'#252525'}},
        y:{ticks:{color:'#555',font:{family:'DM Mono',size:9},maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'#252525'}}
      }
    }
  });
}

// ── RENDER TODAY ─────────────────────────────────────────────────

  const todayIdx=rows.length-1;
  const today=rows[todayIdx];
  const prev=todayIdx>0?rows[todayIdx-1]:null;

  const date     = today['Date']||'';
  const load     = f(today['Load(体感强度)']);
  const trimp    = f(today['TRIMP(心肺强度)']);
  const ctl      = f(today['CTL(体能)']);
  const atl      = f(today['ATL(疲劳)']);
  const tsb      = f(today['TSB(恢复)']);
  const acwr     = f(today['ACWR(急慢性负荷比)']);
  const indicator= today['指示器']||'';

  const wkAvgLoad  = weekAvg(rows,'Load(体感强度)', todayIdx);
  const wkAvgTrimp = weekAvg(rows,'TRIMP(心肺强度)',todayIdx);

  document.getElementById('hDate').textContent=fmtDate(date);
  const ds=daysSince(date);
  const staleEl=document.getElementById('hStale');
  if(ds!==null&&ds>0){staleEl.textContent=`⚠ 最近数据来自 ${ds} 天前`;staleEl.style.display='block';}
  else staleEl.style.display='none';

  const isRest=load===0&&trimp===0;
  const acwrPct=Math.min(Math.max((acwr/3)*100,2),98).toFixed(1);

  main.innerHTML=`
    <div class="fade"><div class="stat-grid">

      <div class="stat-card c-load${isRest?' rest-day':''}">
        <span class="stat-lbl">Load 体感强度</span>
        <div class="stat-right" style="margin-top:6px">
          <span class="stat-val-lg" style="color:var(--amber)">${load.toFixed(0)}</span>
          ${isRest?`<span class="rest-badge">休息日</span>`:deltaHTML(load,wkAvgLoad,0,'vs 本周均')}

      </div>

      <div class="stat-card c-trimp${isRest?' rest-day':''}">
        <span class="stat-lbl">TRIMP 心肺</span>
        <div class="stat-right" style="margin-top:6px">
          <span class="stat-val-lg" style="color:var(--pink)">${trimp.toFixed(0)}</span>
          ${isRest?`<span class="rest-badge">休息日</span>`:deltaHTML(trimp,wkAvgTrimp,0,'vs 本周均')}
        </div>
      </div>

    </div></div>

    <div class="indicator-card fade">
      <span class="indicator-lbl">今日指示器</span>
      <span class="indicator-emoji">${indicator||'—'}</span>
    </div>

    <div class="acwr-card fade">
      <div class="acwr-top">
        <span class="acwr-title">ACWR &nbsp;受伤风险</span>
        <span class="acwr-val" style="color:${acwrColor(acwr)}">${acwr>0?acwr.toFixed(2):'—'}</span>
      </div>
      <div class="acwr-track"><div class="acwr-thumb" style="left:${acwr>0?acwrPct:2}%;background:${acwrColor(acwr)};box-shadow:0 0 0 3px ${acwrColor(acwr)}33,0 0 14px ${acwrColor(acwr)}66"></div></div>
      <div class="acwr-ticks"><span>0</span><span>0.75</span><span>1.5</span><span>2.25</span><span>3.0+</span></div>
      <div class="acwr-zones">
        <span style="color:#2a5070">偏低</span><span style="color:#1a6040">最佳</span>
        <span style="color:#6b3a1a">注意</span><span style="color:#6b1a1a">过载</span>
      </div>
    </div>

    <div class="chart-card fade">
      <div class="chart-head">
        <span class="chart-title">PMC</span>
        <div style="display:flex;gap:6px">
          <span class="rpill" data-range="7d" onclick="drawChart('7d')">本周</span>
          <span class="rpill active" data-range="30d" onclick="drawChart('30d')">近30天</span>
          <span class="rpill" data-range="ytd" onclick="drawChart('ytd')">今年</span>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="pmcCanvas"></canvas></div>
      <div class="chart-legend">
        <div class="leg"><div class="leg-swatch bar" style="background:#5b9cf6"></div>CTL 体能</div>
        <div class="leg"><div class="leg-swatch" style="background:#ff3cac"></div>ATL 疲劳</div>
        <div class="leg"><div class="leg-swatch" style="background:#ff4444"></div>TSB 恢复</div>
      </div>
    </div>

    <div class="metric-row fade">
      <div class="metric-card c-ctl"><span class="metric-lbl">CTL</span><span class="metric-val">${ctl.toFixed(1)}</span><span class="metric-sub">体能</span></div>
      <div class="metric-card c-atl"><span class="metric-lbl">ATL</span><span class="metric-val">${atl.toFixed(1)}</span><span class="metric-sub">疲劳</span></div>
      <div class="metric-card c-tsb"><span class="metric-lbl">TSB</span><span class="metric-val" style="color:${tsb>=0?'#26d0a0':'#ff4444'}">${tsb.toFixed(1)}</span><span class="metric-sub">恢复</span></div>
    </div>

  drawChart(chartRange);
}

// ── RENDER LOG ───────────────────────────────────────────────────
const LOG_PS=30;let logPage=0,logObs=null;

function renderLogPage(rev,page){
  const start=page*LOG_PS,chunk=rev.slice(start,start+LOG_PS);
  if(!chunk.length)return;
  const con=document.getElementById('log-cards');
  const wk=['日','一','二','三','四','五','六'];
  let lastMon=con.dataset.lastMonth||'';

  chunk.forEach((r,ci)=>{
    const ri=start+ci,prev=rev[ri+1]||null;
    const date     = r['Date']||'';
    const load     = f(r['Load(体感强度)']);
    const trimp    = f(r['TRIMP(心肺强度)']);
    const ctl      = f(r['CTL(体能)']);
    const atl      = f(r['ATL(疲劳)']);
    const tsb      = f(r['TSB(恢复)']);
    const acwr     = f(r['ACWR(急慢性负荷比)']);
    const srpe     = f(r['单日总sRPE']);
    const rhr      = f(r['RHR']);
    const hrv      = f(r['HRV']);
    const hrv7     = f(r['7天平均 HRV']);
    const hrvRatio = f(r['HRV Ratio']);
    const indicator= r['指示器']||'';

    const pLoad  = prev?f(prev['Load(体感强度)']):null;
    const pTrimp = prev?f(prev['TRIMP(心肺强度)']):null;
    const pCtl   = prev?f(prev['CTL(体能)']):null;
    const pAtl   = prev?f(prev['ATL(疲劳)']):null;
    const pTsb   = prev?f(prev['TSB(恢复)']):null;
    const pAcwr  = prev?f(prev['ACWR(急慢性负荷比)']):null;
    const pRhr   = prev?f(prev['RHR']):null;
    const pHrv   = prev?f(prev['HRV']):null;

    const isRest=load===0&&trimp===0;
    const d=new Date((date).replace(/\//g,'-'));
    const dateLabel=isNaN(d)?date:`${d.getMonth()+1}月${d.getDate()}日 周${wk[d.getDay()]}`;

    const mkey=fmtMonthKey(date);
    if(mkey!==lastMon){
      lastMon=mkey;con.dataset.lastMonth=mkey;
      const mdiv=document.createElement('div');mdiv.className='month-divider';
      mdiv.innerHTML=`<span>${fmtMonthLabel(mkey)}</span>`;con.appendChild(mdiv);
    }

    const sparkVals=rev.slice(Math.max(0,ri-6),ri+1).map(x=>f(x['TSB(恢复)'])).reverse();

    const card=document.createElement('div');
    card.className='log-card';
    card.innerHTML=`
      <div class="log-summary" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="log-summary-left">
          <div class="log-top-row">
            <span class="log-date">${dateLabel}</span>
            ${isRest?`<span class="rest-tag">休息</span>`:''}
            ${indicator?`<span class="log-indicator">${indicator}</span>`:''}
          </div>
          <div class="log-quick-row">
            <div class="log-qstat"><span class="log-qval" style="color:var(--amber)">${load.toFixed(0)}</span><span class="log-qlbl">Load</span></div>
            <div class="log-qstat"><span class="log-qval" style="color:var(--pink)">${trimp.toFixed(0)}</span><span class="log-qlbl">TRIMP</span></div>
            <div class="log-qstat"><span class="log-qval" style="color:var(--teal)">${hrv>0?hrv.toFixed(0):'—'}</span><span class="log-qlbl">HRV</span></div>
          </div>
        </div>
        <div class="log-summary-right">
          ${sparkSVG(sparkVals)}
          <span class="log-chevron">▾</span>
        </div>
      </div>
      <div class="log-detail">

        <div class="log-section">
          <div class="log-section-title">训练负荷</div>
          <div class="log-row">
            <div class="log-stat"><span class="log-stat-lbl">Load</span><div class="log-stat-val" style="color:var(--amber)">${load.toFixed(0)}${trendIcon(load,pLoad,0)}</div></div>
            <div class="log-stat"><span class="log-stat-lbl">TRIMP</span><div class="log-stat-val" style="color:var(--pink)">${trimp.toFixed(0)}${trendIcon(trimp,pTrimp,0)}</div></div>
            <div class="log-stat"><span class="log-stat-lbl">sRPE</span><div class="log-stat-val" style="color:var(--muted)">${srpe>0?srpe.toFixed(0):'—'}</div></div>
          </div>
        </div>

        <div class="log-section">
          <div class="log-section-title">体能状态</div>
          <div class="log-row">
            <div class="log-stat"><span class="log-stat-lbl">CTL 体能</span><div class="log-stat-val cv-ctl">${ctl.toFixed(1)}${trendIcon(ctl,pCtl,1)}</div></div>
            <div class="log-stat"><span class="log-stat-lbl">ATL 疲劳</span><div class="log-stat-val cv-atl">${atl.toFixed(1)}${trendIcon(atl,pAtl,1)}</div></div>
            <div class="log-stat"><span class="log-stat-lbl">TSB 恢复</span><div class="log-stat-val ${tsb>=0?'cv-tsb-pos':'cv-tsb-neg'}">${tsb.toFixed(1)}${trendIcon(tsb,pTsb,1)}</div></div>
          </div>
          <div class="log-row cols2" style="margin-top:8px">
            <div class="log-stat"><span class="log-stat-lbl">ACWR 受伤风险</span><div class="log-stat-val" style="color:${acwrColor(acwr)}">${acwr>0?acwr.toFixed(2):'—'}${acwr>0?trendIcon(acwr,pAcwr,2):''}</div></div>
          </div>
        </div>

        <div class="log-section">
          <div class="log-section-title">心率 / HRV</div>
          <div class="log-row">
            <div class="log-stat"><span class="log-stat-lbl">RHR</span><div class="log-stat-val" style="color:var(--blue)">${rhr>0?rhr.toFixed(0):'—'}${rhr>0?trendIcon(rhr,pRhr,0):''}</div></div>
            <div class="log-stat"><span class="log-stat-lbl">HRV</span><div class="log-stat-val" style="color:var(--teal)">${hrv>0?hrv.toFixed(0):'—'}${hrv>0?trendIcon(hrv,pHrv,0):''}</div></div>
            ${hrv7>0?`<div class="log-stat"><span class="log-stat-lbl">7天均 HRV</span><div class="log-stat-val" style="color:var(--teal)">${hrv7.toFixed(0)}</div></div>`:'<div></div>'}
          </div>
          ${hrvRatio>0?`
          <div class="log-row cols2" style="margin-top:8px">
            <div class="log-stat"><span class="log-stat-lbl">HRV Ratio</span><div class="log-stat-val" style="color:${hrvRatio>=1?'var(--teal)':'var(--amber)'}">${hrvRatio.toFixed(2)}</div></div>
          </div>`:''}
        </div>

      </div>`;
    con.appendChild(card);
    con.appendChild(card);
  });
}

function renderLog(rows){
  const el=document.getElementById('log-main');
  if(!rows.length){el.innerHTML=`<div class="state"><span>无数据</span></div>`;return;}
  const rev=[...rows].reverse();
  logPage=0;if(logObs)logObs.disconnect();
  el.innerHTML=`
    <div id="log-cards" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div id="log-sentinel" style="height:1px;margin-bottom:8px;"></div>
    <div id="log-end" style="display:none;text-align:center;padding:16px 0;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.1em;">— 已加载全部 ${rev.length} 条 —</div>`;
  renderLogPage(rev,0);logPage=1;
  if(rev.length<=LOG_PS){document.getElementById('log-sentinel').style.display='none';document.getElementById('log-end').style.display='block';return;}
  const sentinel=document.getElementById('log-sentinel');
  const scrollRoot=document.getElementById('log-main');
  logObs=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting)return;
    if(logPage*LOG_PS>=rev.length){logObs.disconnect();sentinel.style.display='none';document.getElementById('log-end').style.display='block';return;}
    renderLogPage(rev,logPage++);
  },{root:scrollRoot,rootMargin:'200px'});
  logObs.observe(sentinel);
}

// ── CACHE ────────────────────────────────────────────────────────
function saveCache(t){try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),csv:t}));}catch(e){}}
function loadCache(){try{const d=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');return d?d.csv:null;}catch(e){return null;}}

// ── LOAD ─────────────────────────────────────────────────────────
const WORKER_URL = 'https://polished-pond-d9e9.chenrinan.workers.dev';

function fetchWithTimeout(url, ms=8000) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('请求超时')), ms);
    fetch(url, { cache:'no-store' })
      .then(r => { clearTimeout(timer); resolve(r); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

async function fetchCSV() {
  const res = await fetchWithTimeout(WORKER_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  if (!text || text.length < 10) throw new Error('empty response');
  return text;
}

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML=`<div class="state"><div class="spinner"></div><span>加载数据中…</span></div>`;
  try{
    const text = await fetchCSV();
    saveCache(text);render(parseCSV(text));
  }catch(e){
    const cached=loadCache();
    if(cached){
      render(parseCSV(cached));
      const s=document.getElementById('hStale');
      s.textContent='⚠ 离线模式 · 显示上次缓存';s.style.display='block';
    }else{
      document.getElementById('main').innerHTML=`
        <div class="state"><span class="err">⚠️ 所有代理均失败<br><br>${e.message}<br><br>请检查网络后重试。</span>
        <button onclick="loadData()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 28px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;">重试</button></div>`;
    }
  }finally{btn.classList.remove('spinning');}
}

loadData();
</script>

  <script>
/* === PRECISION SHARED CODE === */
/* ═══════════════════════════════════════════════════════
   PRECISION — Shared Data Layer & Utilities
   ═══════════════════════════════════════════════════════ */

const WORKER   = 'https://polished-pond-d9e9.chenrinan.workers.dev';
const LS_KEY   = 'precision_v1';
const CACHE_TTL = 5 * 60 * 1000;
let   MEM = { daily: null, workouts: null, ts: 0 };

/* ── CSV Parser ─────────────────────────────────────── */
function parseCSV(raw) {
  const rows = []; let i = 0, n = raw.length;
  while (i < n) {
    const row = []; let eol = false;
    while (!eol && i < n) {
      let val = '';
      if (raw[i] === '"') {
        i++;
        while (i < n) {
          if (raw[i] === '"' && raw[i+1] === '"') { val += '"'; i += 2; }
          else if (raw[i] === '"') { i++; break; }
          else val += raw[i++];
        }
      } else {
        while (i < n && raw[i] !== ',' && raw[i] !== '\r' && raw[i] !== '\n') val += raw[i++];
      }
      row.push(val.trim());
      if (i < n && raw[i] === ',') i++; else eol = true;
    }
    while (i < n && (raw[i] === '\r' || raw[i] === '\n')) i++;
    if (row.some(v => v)) rows.push(row);
  }
  if (!rows.length) return [];

  // Auto-detect header row: skip rows that don't contain "Date" in first cell
  // The Daily sheet has a description row before the actual header row
  let headerIdx = 0;
  for (let ri = 0; ri < Math.min(rows.length, 3); ri++) {
    const first = (rows[ri][0]||'').trim();
    if (first.toLowerCase() === 'date' || first === 'Date') { headerIdx = ri; break; }
  }

  const hdrs = rows[headerIdx].map(h => h.replace(/\s+/g,' ').trim());
  return rows.slice(headerIdx + 1).map(cols => {
    const o = {}; hdrs.forEach((h,j) => { o[h] = (cols[j]||'').trim(); }); return o;
  }).filter(r => {
    const v = r[hdrs[0]];
    return v && v.trim() && v.toLowerCase() !== hdrs[0].toLowerCase();
  });
}

/* ── Fetch ──────────────────────────────────────────── */
function ftch(url, ms=9000) {
  return new Promise((res,rej) => {
    const t = setTimeout(() => rej(new Error('timeout')), ms);
    fetch(url,{cache:'no-store'}).then(r=>{clearTimeout(t);res(r);}).catch(e=>{clearTimeout(t);rej(e);});
  });
}

async function loadData(force=false) {
  const now = Date.now();
  if (!force && MEM.daily && (now-MEM.ts) < CACHE_TTL) return { daily:MEM.daily, workouts:MEM.workouts };
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if (!force && stored && (now-stored.ts) < CACHE_TTL) {
      MEM = { daily:stored.daily, workouts:stored.workouts, ts:stored.ts };
      return { daily:MEM.daily, workouts:MEM.workouts };
    }
  } catch(e){}

  const [dr, wr] = await Promise.all([
    ftch(`${WORKER}?sheet=daily`),
    ftch(`${WORKER}?sheet=workouts`),
  ]);
  if (!dr.ok) throw new Error(`HTTP ${dr.status}`);
  if (!wr.ok) throw new Error(`HTTP ${wr.status}`);
  const [dt, wt] = await Promise.all([dr.text(), wr.text()]);
  MEM.daily = parseCSV(dt); MEM.workouts = parseCSV(wt); MEM.ts = now;
  try { localStorage.setItem(LS_KEY, JSON.stringify(MEM)); } catch(e){}
  return { daily:MEM.daily, workouts:MEM.workouts };
}

/* ── Field getters (handles both column naming conventions) ── */
const f = v => parseFloat(v)||0;
const getLoad  = r => f(r['Load']||r['Load(体感强度)']||0);
const getTrimp = r => f(r['TRIMP']||r['TRIMP(心肺强度)']||0);
const getCTL   = r => f(r['CTL']||r['CTL(体能)']||0);
const getATL   = r => f(r['ATL']||r['ATL(疲劳)']||0);
const getTSB   = r => f(r['TSB']||r['TSB(恢复)']||0);
const getACWR  = r => f(r['ACWR']||r['ACWR(急慢性负荷比)']||0);
const getHRV   = r => f(r['HRV']||0);
const getHRV7  = r => f(r['7天平均 HRV']||r['7天平均HRV']||0);
const getHRVR  = r => f(r['HRV Ratio']||0);
const getRHR   = r => f(r['RHR']||0);
const getSRPE  = r => f(r['单日总sRPE']||0);
const getInd   = r => (r['指示器']||'');
const getDate  = r => (r['Date']||r['date']||'').trim();

const wkDate   = r => (r['Date']||r['date']||'').trim();
const wkSport  = r => (r['Sport']||r['sport']||'');
const wkDur    = r => f(r['Duration_min']||0);
const wkLoad   = r => f(r['Load']||r['load']||0);
const wkTrimp  = r => f(r['TRIMP']||r['trimp']||0);
const wkRPE    = r => f(r['RPE']||r['rpe']||0);
const wkAvgHR  = r => f(r['Avg_HR']||0);
const wkMaxHR  = r => f(r['Max_HR']||0);

/* ── Semantic helpers ───────────────────────────────── */
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTHS_LONG  = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function fmtDateLong(s) {
  const d = new Date((s||'').replace(/\//g,'-')); if(isNaN(d)) return s;
  return `${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtMonthYear(y,m) { return `${MONTHS_LONG[m]} ${y}`; }

function formLabel(tsb) {
  if(tsb > 25)  return { label:'FRESH',        col:'#a8e063' };
  if(tsb > 5)   return { label:'OPTIMAL',      col:'#a8e063' };
  if(tsb > -10) return { label:'PRODUCTIVE',   col:'#f5d020' };
  if(tsb > -30) return { label:'OVER',         col:'#ff6b35' };
  return              { label:'OVERREACHING',  col:'#ff3b30' };
}

function acwrLabel(acwr) {
  if(!acwr)      return { label:'REST',          col:'#555' };
  if(acwr < 0.8) return { label:'LOW',           col:'#5b9cf6' };
  if(acwr <=1.3) return { label:'OPTIMAL',       col:'#a8e063' };
  if(acwr <=1.5) return { label:'HIGHINTENSITY', col:'#f5d020' };
  return              { label:'OVERREACHING',   col:'#ff3b30' };
}

function loadBucket(load) {
  if(!load) return 'rest';
  if(load < 100) return 'low';
  if(load < 400) return 'medium';
  if(load < 700) return 'high';
  return 'peak';
}

function sportIcon(sport) {
  const s = (sport||'').toLowerCase();
  if(s.includes('网球')||s.includes('tennis'))    return '🎾';
  if(s.includes('羽毛球')||s.includes('badminton'))return '🏸';
  if(s.includes('跑')||s.includes('run'))         return '🏃';
  if(s.includes('游泳')||s.includes('swim'))      return '🏊';
  if(s.includes('骑')||s.includes('bike')||s.includes('cycl')) return '🚴';
  if(s.includes('力量')||s.includes('gym')||s.includes('weight')) return '🏋️';
  if(s.includes('瑜伽')||s.includes('yoga'))      return '🧘';
  if(s.includes('滑')||s.includes('ski')||s.includes('snow')) return '⛷️';
  if(s.includes('步行')||s.includes('walk'))      return '🚶';
  return '⚡';
}

function fmtDuration(mins) {
  if(!mins) return '—';
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

function buildDateIndex(daily) {
  const idx={};
  daily.forEach(r=>{ const k=getDate(r); if(k) idx[k]=r; });
  return idx;
}

/* ── Show loading/error ─────────────────────────────── */
function showLoading(el) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><div class="spinner"></div><span>LOADING</span></div>`;
}
function showError(el, msg) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><span style="font-size:24px">⚠</span><span>${msg}</span><button onclick="location.reload()">RETRY</button></div>`;
}
function setNav(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
}

/* ── Shared Nav HTML ────────────────────────────────── */
const NAV_HTML = `<nav class="bottom-nav">
  <a class="nav-item" data-page="dashboard" href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    <span>DASHBOARD</span>
  </a>
  <a class="nav-item" data-page="calendar" href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
    <span>CALENDAR</span>
  </a>
  <a class="nav-item" data-page="trends" href="trends.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 9-9"/></svg>
    <span>TRENDS</span>
  </a>
  <a class="nav-item" data-page="logs" href="logs.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    <span>LOGS</span>
  </a>
</nav>`;

</script>
  <style>
    :root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--border:#282828;--border2:#333;--text:#f0f0f0;--sub:#aaa;--muted:#555;--accent:#c8f000;--red:#ff3b30;--orange:#ff6b35;--yellow:#f5d020;--green:#a8e063;--blue:#5b9cf6;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,0px);--nav-h:calc(58px + var(--safe-bot))}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{overflow-x:hidden;touch-action:pan-y;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;overscroll-behavior:none}
    ::-webkit-scrollbar{display:none}*{scrollbar-width:none}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);padding-bottom:var(--safe-bot);background:rgba(14,14,14,.97);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:10px;text-decoration:none;color:var(--muted);transition:color .2s}
    .nav-item svg{width:20px;height:20px}.nav-item span{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.1em}
    .nav-item.active{color:var(--accent)}.nav-item.active svg{filter:drop-shadow(0 0 5px var(--accent))}
    .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.12em}
    .state-box button{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 24px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade{animation:fadeUp .35s ease both}.fade-1{animation-delay:.06s}.fade-2{animation-delay:.12s}.fade-3{animation-delay:.18s}.fade-4{animation-delay:.24s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .page-wrap{padding-bottom:calc(var(--nav-h)+12px)}

    /* HEADER */
    .header{padding:calc(var(--safe-top)+10px) 20px 12px;display:flex;align-items:flex-end;justify-content:space-between}
    .header-left{display:flex;flex-direction:column;gap:2px}
    .h-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--muted)}
    .h-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:.06em;line-height:1}
    .icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;border:none;background:transparent}
    .icon-btn svg{width:20px;height:20px}
    .icon-btn.spinning{animation:spin .7s linear infinite}

    /* CHART CARDS */
    .chart-block{margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px 16px 14px;overflow:hidden}
    .chart-block-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
    .chart-block-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--sub)}
    .chart-block-badge{font-family:'DM Mono',sans-serif;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .chart-block-badge span{display:inline-flex;align-items:center;gap:3px}
    .legend-line{width:16px;height:2px;border-radius:1px;display:inline-block}
    .chart-big-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;margin-bottom:14px}
    .chart-big-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.18em;color:var(--muted)}
    .chart-wrap{height:130px;position:relative}
    .chart-x-labels{display:flex;justify-content:space-between;margin-top:6px;padding:0 2px;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.1em;color:var(--muted)}

    /* HRV sub section */
    .hrv-stats{display:flex;align-items:baseline;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .hrv-stat{display:flex;flex-direction:column;gap:2px}
    .hrv-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1}
    .hrv-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.14em;color:var(--muted)}
    .hrv-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:4px;margin-left:6px}

    /* 2x2 MINI CARDS */
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 16px}
    .mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
    .mini-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.18em;color:var(--muted);margin-bottom:8px}
    .mini-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1;letter-spacing:-.01em}
    .mini-unit{font-size:14px;font-weight:400;color:var(--muted);margin-left:2px}
    .mini-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;margin-top:6px;display:flex;align-items:center;gap:4px}
    .mini-delta{font-family:'DM Mono',sans-serif;font-size:10px;color:var(--muted);margin-top:4px}
  </style>
</head>
<body>
<div class="page-wrap">
  <header class="header">
    <div class="header-left">
      <span class="h-eyebrow">METRIC ANALYSIS</span>
      <span class="h-title">TRENDS</span>
    </div>
    <button class="icon-btn" id="refreshBtn" onclick="init(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115.4-4.4M20 15a9 9 0 01-15.4 4.4"/></svg>
    </button>
  </header>
  <div id="content"><div class="state-box"><div class="spinner"></div><span>LOADING</span></div></div>
</div>
<div id="nav-placeholder"></div>

<script>
document.getElementById('nav-placeholder').innerHTML = NAV_HTML;
setNav('trends');
let charts=[];

async function init(force=false){
  const btn=document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  const el=document.getElementById('content');
  el.innerHTML=`<div class="state-box"><div class="spinner"></div><span>LOADING</span></div>`;
  try{
    const {daily}=await loadData(force);
    charts.forEach(c=>c.destroy()); charts=[];
    renderTrends(daily);
  }catch(e){
    el.innerHTML=`<div class="state-box"><span style="font-size:24px">⚠</span><span>${e.message}</span><button onclick="init()">RETRY</button></div>`;
  }finally{ if(btn) btn.classList.remove('spinning'); }
}

function mkChart(id,type,labels,datasets,opts={}){
  const ctx=document.getElementById(id);
  if(!ctx) return null;
  const c=new Chart(ctx,{
    type,
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:600},
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1a1a1a',borderColor:'#333',borderWidth:1,
        titleColor:'#666',bodyColor:'#eee',padding:8,
        titleFont:{family:'Barlow Condensed',size:10},
        bodyFont:{family:'DM Mono',size:11}
      }},
      scales:{
        x:{display:false,grid:{display:false}},
        y:{display:false,grid:{display:false},...(opts.y||{})}
      },
      ...opts.chart
    }
  });
  charts.push(c);
  return c;
}

function renderTrends(daily){
  if(!daily.length){ document.getElementById('content').innerHTML=`<div class="state-box"><span>No data</span></div>`; return; }
  const last=daily[daily.length-1];
  const ctl=getCTL(last),atl=getATL(last),tsb=getTSB(last);
  const hrv=getHRV(last),hrv7=getHRV7(last),hrvR=getHRVR(last),rhr=getRHR(last);

  // slices
  const sl90=daily.slice(-90), sl30=daily.slice(-30);
  const lbl90=sl90.map((_,i)=>i);
  const lbl30=sl30.map((_,i)=>i);

  const ctlD=sl90.map(r=>getCTL(r)),atlD=sl90.map(r=>getATL(r)),tsbD=sl90.map(r=>getTSB(r));
  const hrvD=sl30.map(r=>getHRV(r)>0?getHRV(r):null);
  const hrv7D=sl30.map(r=>getHRV7(r)>0?getHRV7(r):null);

  const tsbForm=formLabel(tsb);
  const acwr=getACWR(last);
  const acwrL=acwrLabel(acwr);

  document.getElementById('content').innerHTML=`

    <!-- TRAINING LOAD -->
    <div class="chart-block fade">
      <div class="chart-block-header">
        <div class="chart-block-title">TRAINING LOAD</div>
        <div class="chart-block-badge">
          <span><span class="legend-line" style="background:var(--yellow)"></span>CTL (FITNESS)</span>
          <span><span class="legend-line" style="background:var(--blue)"></span>ATL (FATIGUE)</span>
        </div>
      </div>
      <div class="chart-big-val" style="color:var(--yellow)">${ctl.toFixed(1)}</div>
      <div class="chart-big-lbl">CURRENT CTL</div>
      <div class="chart-wrap"><canvas id="ctlChart"></canvas></div>
      <div class="chart-x-labels"><span>90 DAYS AGO</span><span>30 DAYS AGO</span><span>TODAY</span></div>
    </div>

    <!-- HRV -->
    <div class="chart-block fade fade-1">
      <div class="chart-block-header">
        <div class="chart-block-title">HRV & BASELINE</div>
        <div class="chart-block-badge">
          <span style="color:var(--blue)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 17l5-5 4 4 9-9"/></svg>
          </span>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="hrvChart"></canvas></div>
      <div class="hrv-stats">
        <div class="hrv-stat">
          <div class="hrv-stat-val" style="color:var(--blue)">${hrv7>0?hrv7.toFixed(0):hrv.toFixed(0)}<span style="font-size:12px;color:var(--muted)">ms</span></div>
          <div class="hrv-stat-lbl">7D AVERAGE</div>
        </div>
        <div style="display:flex;align-items:baseline">
          <span class="hrv-status" style="background:${hrvR>=1?'#1a3a1a':'#3a1a1a'};color:${hrvR>=1?'var(--green)':'var(--orange)'}">
            ${hrvR>=1?'OPTIMAL':'BELOW BASE'}
          </span>
        </div>
        <div class="hrv-stat" style="margin-left:auto">
          <div class="hrv-stat-val">${hrvR>0?'RATIO: '+hrvR.toFixed(2):''}</div>
          <div class="hrv-stat-lbl">${rhr>0?'RHR: '+rhr.toFixed(0)+' BPM':''}</div>
        </div>
      </div>
    </div>

    <!-- TSB (Recovery Balance) -->
    <div class="chart-block fade fade-2">
      <div class="chart-block-header">
        <div class="chart-block-title">RECOVERY BALANCE (TSB)</div>
        <div class="chart-block-badge" style="color:${tsbForm.col}">●</div>
      </div>
      <div class="chart-wrap"><canvas id="tsbChart"></canvas></div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.16em;color:var(--muted);margin-bottom:4px">TRAINING STRESS BALANCE</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:${tsbForm.col}">${tsb>=0?'+':''}${tsb.toFixed(1)} <span style="font-size:12px;font-weight:400">${tsbForm.label}</span></div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);text-align:right">LOAD: ${acwrL.label}</div>
      </div>
    </div>

    <!-- MINI CARDS -->
    <div class="mini-grid fade fade-3">
      <div class="mini-card">
        <div class="mini-lbl">LOAD RATIO</div>
        <div class="mini-val" style="color:${acwrL.col}">${acwr>0?acwr.toFixed(2):'—'}</div>
        <div class="mini-tag" style="color:${acwrL.col}">▲ ${acwrL.label}</div>
      </div>
      <div class="mini-card">
        <div class="mini-lbl">REST HR</div>
        <div class="mini-val">${rhr>0?rhr.toFixed(0):'—'}<span class="mini-unit">${rhr>0?'BPM':''}</span></div>
        <div class="mini-tag" style="color:var(--blue)">● STABLE</div>
      </div>
      <div class="mini-card">
        <div class="mini-lbl">CTL FITNESS</div>
        <div class="mini-val" style="color:var(--yellow)">${ctl.toFixed(1)}</div>
        ${daily.length>7?`<div class="mini-delta">+${(ctl-getCTL(daily[daily.length-8])).toFixed(1)} 7d</div>`:''}
      </div>
      <div class="mini-card">
        <div class="mini-lbl">HRV RATIO</div>
        <div class="mini-val" style="color:${hrvR>=1?'var(--green)':'var(--orange)'}">${hrvR>0?hrvR.toFixed(2):'—'}</div>
        <div class="mini-tag" style="color:${hrvR>=1?'var(--green)':'var(--orange)'}">● ${hrvR>=1?'OPTIMAL':'CAUTION'}</div>
      </div>
    </div>
    <div style="height:8px"></div>
  `;

  // draw charts
  requestAnimationFrame(()=>{
    mkChart('ctlChart','line',lbl90,[
      {label:'CTL',data:ctlD,borderColor:'#f5d020',backgroundColor:'rgba(245,208,32,.06)',borderWidth:2,pointRadius:0,tension:.4,fill:true},
      {label:'ATL',data:atlD,borderColor:'#5b9cf6',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.4},
    ]);
    mkChart('hrvChart','line',lbl30,[
      {label:'HRV',data:hrvD,borderColor:'#5b9cf6',backgroundColor:'rgba(91,156,246,.08)',borderWidth:2,pointRadius:0,tension:.4,fill:true,spanGaps:true},
      {label:'7D',data:hrv7D,borderColor:'rgba(91,156,246,.4)',backgroundColor:'transparent',borderWidth:1,pointRadius:0,tension:.4,borderDash:[4,4],spanGaps:true},
    ]);
    mkChart('tsbChart','line',lbl90,[
      {label:'TSB',data:tsbD,borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,.08)',borderWidth:2,pointRadius:0,tension:.4,fill:true},
    ],{y:{min:Math.min(...tsbD)*1.1}});
  });
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0e0e0e"/>
<title>PRECISION — Trends</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--sub:#c0c0c0;--muted:#888;--accent:#c8f000;--red:#ff3b30;--orange:#ff6b35;--yellow:#f5d020;--green:#a8e063;--blue:#5b9cf6;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,0px);--nav-h:calc(58px + var(--safe-bot))}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;touch-action:pan-y;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;overscroll-behavior:none}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);padding-bottom:var(--safe-bot);background:rgba(14,14,14,.97);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding-top:10px;text-decoration:none;color:var(--muted);transition:color .2s}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;font-weight:600}
.nav-item.active{color:var(--accent)}.nav-item.active svg{filter:drop-shadow(0 0 5px var(--accent))}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.12em}
.state-box button{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 28px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;border:none;background:transparent;transition:background .15s}
.icon-btn:active{background:var(--border)}.icon-btn svg{width:22px;height:22px}.icon-btn.spinning{animation:spin .7s linear infinite}

/* ── HEADER ── */
.header{padding:calc(var(--safe-top) + 18px) 24px 16px;display:flex;align-items:flex-end;justify-content:space-between}
.h-left{display:flex;flex-direction:column;gap:4px}
.h-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.22em;color:var(--muted);font-weight:500}
.h-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;letter-spacing:.04em;line-height:1}
.page-wrap{padding-bottom:var(--nav-h)}

.filter-row{display:flex;gap:8px;padding:4px 20px 18px;overflow-x:auto}
.fpill{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;padding:7px 16px;border-radius:999px;border:1px solid var(--border);color:var(--sub);cursor:pointer;user-select:none;white-space:nowrap;transition:all .15s;background:transparent;flex-shrink:0}
.fpill.active{background:var(--accent);border-color:var(--accent);color:#000}
.chart-block{margin:0 16px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 18px 16px;overflow:hidden}
.chart-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.14em;color:var(--sub)}
.chart-legend{display:flex;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;color:var(--sub);font-weight:600}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-line{width:16px;height:2.5px;border-radius:1px}
.chart-big{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;margin-bottom:14px}
.chart-wrap{height:145px;position:relative}
.chart-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline}
.hrv-stats{display:flex;gap:20px;align-items:baseline;flex-wrap:wrap}
.hrv-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;padding:3px 10px;border-radius:4px}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 18px}
.mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.mini-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.16em;color:var(--sub);font-weight:600;margin-bottom:10px}
.mini-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1}
.mini-unit{font-size:14px;font-weight:400;color:var(--muted);margin-left:2px}
.mini-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;margin-top:8px}
</style>
</head>
<body>

<div class="page-wrap">
  <header class="header">
    <div class="h-left">
      <span class="h-eyebrow">METRIC ANALYSIS</span>
      <span class="h-title">TRENDS</span>
    </div>
    <button class="icon-btn" id="refreshBtn" onclick="init(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115.4-4.4M20 15a9 9 0 01-15.4 4.4"/></svg>
    </button>
  </header>
  <div class="filter-row">
    <div class="fpill" data-r="7d" onclick="setRange('7d',this)">LAST 7 DAYS</div>
    <div class="fpill active" data-r="30d" onclick="setRange('30d',this)">LAST 30 DAYS</div>
    <div class="fpill" data-r="ytd" onclick="setRange('ytd',this)">YEAR TO DATE</div>
    <div class="fpill" data-r="all" onclick="setRange('all',this)">ALL TIME</div>
  </div>
  <div id="content"><div class="state-box"><div class="spinner"></div><span>LOADING</span></div></div>
</div>
<div id="navwrap"></div>

<script>
/* ═══════════════════════════════════════════════════════
   PRECISION — Shared Data Layer & Utilities
   ═══════════════════════════════════════════════════════ */

const WORKER   = 'https://polished-pond-d9e9.chenrinan.workers.dev';
const LS_KEY   = 'precision_v1';
const CACHE_TTL = 5 * 60 * 1000;
let   MEM = { daily: null, workouts: null, ts: 0 };

/* ── CSV Parser ─────────────────────────────────────── */
function parseCSV(raw) {
  const rows = []; let i = 0, n = raw.length;
  while (i < n) {
    const row = []; let eol = false;
    while (!eol && i < n) {
      let val = '';
      if (raw[i] === '"') {
        i++;
        while (i < n) {
          if (raw[i] === '"' && raw[i+1] === '"') { val += '"'; i += 2; }
          else if (raw[i] === '"') { i++; break; }
          else val += raw[i++];
        }
      } else {
        while (i < n && raw[i] !== ',' && raw[i] !== '\r' && raw[i] !== '\n') val += raw[i++];
      }
      row.push(val.trim());
      if (i < n && raw[i] === ',') i++; else eol = true;
    }
    while (i < n && (raw[i] === '\r' || raw[i] === '\n')) i++;
    if (row.some(v => v)) rows.push(row);
  }
  if (!rows.length) return [];

  // Auto-detect header row: skip rows that don't contain "Date" in first cell
  // The Daily sheet has a description row before the actual header row
  let headerIdx = 0;
  for (let ri = 0; ri < Math.min(rows.length, 3); ri++) {
    const first = (rows[ri][0]||'').trim();
    if (first.toLowerCase() === 'date' || first === 'Date') { headerIdx = ri; break; }
  }

  const hdrs = rows[headerIdx].map(h => h.replace(/\s+/g,' ').trim());
  return rows.slice(headerIdx + 1).map(cols => {
    const o = {}; hdrs.forEach((h,j) => { o[h] = (cols[j]||'').trim(); }); return o;
  }).filter(r => {
    const v = r[hdrs[0]];
    return v && v.trim() && v.toLowerCase() !== hdrs[0].toLowerCase();
  });
}

/* ── Fetch ──────────────────────────────────────────── */
function ftch(url, ms=9000) {
  return new Promise((res,rej) => {
    const t = setTimeout(() => rej(new Error('timeout')), ms);
    fetch(url,{cache:'no-store'}).then(r=>{clearTimeout(t);res(r);}).catch(e=>{clearTimeout(t);rej(e);});
  });
}

async function loadData(force=false) {
  const now = Date.now();
  if (!force && MEM.daily && (now-MEM.ts) < CACHE_TTL) return { daily:MEM.daily, workouts:MEM.workouts };
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if (!force && stored && (now-stored.ts) < CACHE_TTL) {
      MEM = { daily:stored.daily, workouts:stored.workouts, ts:stored.ts };
      return { daily:MEM.daily, workouts:MEM.workouts };
    }
  } catch(e){}

  const [dr, wr] = await Promise.all([
    ftch(`${WORKER}?sheet=daily`),
    ftch(`${WORKER}?sheet=workouts`),
  ]);
  if (!dr.ok) throw new Error(`HTTP ${dr.status}`);
  if (!wr.ok) throw new Error(`HTTP ${wr.status}`);
  const [dt, wt] = await Promise.all([dr.text(), wr.text()]);
  MEM.daily = parseCSV(dt); MEM.workouts = parseCSV(wt); MEM.ts = now;
  try { localStorage.setItem(LS_KEY, JSON.stringify(MEM)); } catch(e){}
  return { daily:MEM.daily, workouts:MEM.workouts };
}

/* ── Field getters (handles both column naming conventions) ── */
const f = v => parseFloat(v)||0;
const getLoad  = r => f(r['Load']||r['Load(体感强度)']||0);
const getTrimp = r => f(r['TRIMP']||r['TRIMP(心肺强度)']||0);
const getCTL   = r => f(r['CTL']||r['CTL(体能)']||0);
const getATL   = r => f(r['ATL']||r['ATL(疲劳)']||0);
const getTSB   = r => f(r['TSB']||r['TSB(恢复)']||0);
const getACWR  = r => f(r['ACWR']||r['ACWR(急慢性负荷比)']||0);
const getHRV   = r => f(r['HRV']||0);
const getHRV7  = r => f(r['7天平均 HRV']||r['7天平均HRV']||0);
const getHRVR  = r => f(r['HRV Ratio']||0);
const getRHR   = r => f(r['RHR']||0);
const getSRPE  = r => f(r['单日总sRPE']||0);
const getInd   = r => (r['指示器']||'');
const getDate  = r => (r['Date']||r['date']||'').trim();

const wkDate   = r => (r['Date']||r['date']||'').trim();
const wkSport  = r => (r['Sport']||r['sport']||'');
const wkDur    = r => f(r['Duration_min']||0);
const wkLoad   = r => f(r['Load']||r['load']||0);
const wkTrimp  = r => f(r['TRIMP']||r['trimp']||0);
const wkRPE    = r => f(r['RPE']||r['rpe']||0);
const wkAvgHR  = r => f(r['Avg_HR']||0);
const wkMaxHR  = r => f(r['Max_HR']||0);

/* ── Semantic helpers ───────────────────────────────── */
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTHS_LONG  = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function fmtDateLong(s) {
  const d = new Date((s||'').replace(/\//g,'-')); if(isNaN(d)) return s;
  return `${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtMonthYear(y,m) { return `${MONTHS_LONG[m]} ${y}`; }

function formLabel(tsb) {
  if(tsb > 25)  return { label:'FRESH',        col:'#a8e063' };
  if(tsb > 5)   return { label:'OPTIMAL',      col:'#a8e063' };
  if(tsb > -10) return { label:'PRODUCTIVE',   col:'#f5d020' };
  if(tsb > -30) return { label:'OVER',         col:'#ff6b35' };
  return              { label:'OVER REACHING',  col:'#ff3b30' };
}

function acwrLabel(acwr) {
  if(!acwr)      return { label:'REST',          col:'#555' };
  if(acwr < 0.8) return { label:'LOW',           col:'#5b9cf6' };
  if(acwr <=1.3) return { label:'OPTIMAL',       col:'#a8e063' };
  if(acwr <=1.5) return { label:'HIGH INTENSITY', col:'#f5d020' };
  return              { label:'OVER REACHING',   col:'#ff3b30' };
}

function loadBucket(load) {
  if(!load) return 'rest';
  if(load < 100) return 'low';
  if(load < 400) return 'medium';
  if(load < 700) return 'high';
  return 'peak';
}

function sportIcon(sport) {
  const s = (sport||'').toLowerCase();
  if(s.includes('网球')||s.includes('tennis'))    return '🎾';
  if(s.includes('羽毛球')||s.includes('badminton'))return '🏸';
  if(s.includes('跑')||s.includes('run'))         return '🏃';
  if(s.includes('游泳')||s.includes('swim'))      return '🏊';
  if(s.includes('骑')||s.includes('bike')||s.includes('cycl')) return '🚴';
  if(s.includes('力量')||s.includes('gym')||s.includes('weight')) return '🏋️';
  if(s.includes('瑜伽')||s.includes('yoga'))      return '🧘';
  if(s.includes('滑')||s.includes('ski')||s.includes('snow')) return '⛷️';
  if(s.includes('步行')||s.includes('walk'))      return '🚶';
  return '⚡';
}

function fmtDuration(mins) {
  if(!mins) return '—';
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

function buildDateIndex(daily) {
  const idx={};
  daily.forEach(r=>{ const k=getDate(r); if(k) idx[k]=r; });
  return idx;
}

/* ── Show loading/error ─────────────────────────────── */
function showLoading(el) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><div class="spinner"></div><span>LOADING</span></div>`;
}
function showError(el, msg) {
  if(!el) return;
  el.innerHTML = `<div class="state-box"><span style="font-size:24px">⚠</span><span>${msg}</span><button onclick="location.reload()">RETRY</button></div>`;
}
function setNav(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
}

/* ── Shared Nav HTML ────────────────────────────────── */
const NAV_HTML = `<nav class="bottom-nav">
  <a class="nav-item" data-page="dashboard" href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    <span>DASHBOARD</span>
  </a>
  <a class="nav-item" data-page="calendar" href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
    <span>CALENDAR</span>
  </a>
  <a class="nav-item" data-page="trends" href="trends.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 9-9"/></svg>
    <span>TRENDS</span>
  </a>
  <a class="nav-item" data-page="logs" href="logs.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    <span>LOGS</span>
  </a>
</nav>`;


document.getElementById('navwrap').innerHTML = NAV_HTML;
setNav('trends');
let _daily=[], _range='30d', _charts=[];

function setRange(r,el){
  _range=r;
  document.querySelectorAll('.fpill').forEach(p=>p.classList.toggle('active',p.dataset.r===r));
  if(_daily.length) renderCharts(_daily);
}

async function init(force=false){
  const btn=document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  const el=document.getElementById('content');
  el.innerHTML='<div class="state-box"><div class="spinner"></div><span>LOADING</span></div>';
  try{ const {daily}=await loadData(force); _daily=daily; renderCharts(daily); }
  catch(e){ el.innerHTML=`<div class="state-box"><span style="font-size:24px">⚠</span><span>${e.message}</span><button onclick="init()">RETRY</button></div>`; }
  finally{ if(btn) btn.classList.remove('spinning'); }
}

function getSlice(daily){
  if(_range==='7d') return daily.slice(-7);
  if(_range==='30d') return daily.slice(-30);
  if(_range==='ytd'){ const yr=new Date().getFullYear(); return daily.filter(r=>{ const d=new Date(getDate(r).replace(/\//g,'-')); return !isNaN(d)&&d.getFullYear()===yr; }); }
  return daily;
}

function mkDateLabels(slice){
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return slice.map(r=>{ const d=new Date(getDate(r).replace(/\//g,'-')); return isNaN(d)?getDate(r):`${M[d.getMonth()]} ${d.getDate()}`; });
}

function mkFullDateLabel(r){
  const d=new Date(getDate(r).replace(/\//g,'-'));
  if(isNaN(d)) return getDate(r);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const W=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${W[d.getDay()]} ${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function mkChart(id,datasets,labels,yMin){
  const ctx=document.getElementById(id); if(!ctx) return;
  const slice=getSlice(_daily);
  const c=new Chart(ctx,{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:400},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c1c1e',borderColor:'#3a3a3a',borderWidth:1,
          titleColor:'#c0c0c0',bodyColor:'#f0f0f0',padding:10,
          titleFont:{family:'Barlow Condensed',size:13,weight:'700'},
          bodyFont:{family:'DM Mono',size:12},
          callbacks:{
            title:items=>{ const r=slice[items[0].dataIndex]; return r?mkFullDateLabel(r):items[0].label; }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#888',font:{family:'Barlow Condensed',size:11,weight:'600'},maxRotation:0,maxTicksLimit:7},grid:{color:'rgba(255,255,255,.03)'},border:{color:'#2a2a2a'}},
        y:{ticks:{color:'#888',font:{family:'Barlow Condensed',size:10},maxTicksLimit:5},grid:{color:'rgba(255,255,255,.03)'},border:{color:'transparent'},...(yMin!==undefined?{min:yMin}:{})}
      }
    }
  });
  _charts.push(c);
}

function renderCharts(daily){
  const el=document.getElementById('content');
  _charts.forEach(c=>c.destroy()); _charts=[];
  if(!daily.length){ el.innerHTML='<div class="state-box"><span>No data</span></div>'; return; }
  const last=daily[daily.length-1];
  const ctl=getCTL(last),atl=getATL(last),tsb=getTSB(last),hrv=getHRV(last);
  const hrv7=getHRV7(last),hrvR=getHRVR(last),rhr=getRHR(last),acwr=getACWR(last);
  const acwrL=acwrLabel(acwr),tsbF=formLabel(tsb);
  const slice=getSlice(daily),labels=mkDateLabels(slice);
  const ctlD=slice.map(getCTL),atlD=slice.map(getATL),tsbD=slice.map(getTSB);
  const hrvD=slice.map(r=>getHRV(r)>0?getHRV(r):null);
  const hrv7D=slice.map(r=>getHRV7(r)>0?getHRV7(r):null);

  el.innerHTML=`
    <div class="chart-block fade">
      <div class="chart-top"><div class="chart-title">TRAINING LOAD</div><div class="chart-legend"><div class="leg-item"><div class="leg-line" style="background:var(--yellow)"></div>CTL</div><div class="leg-item"><div class="leg-line" style="background:var(--blue)"></div>ATL</div></div></div>
      <div class="chart-big" style="color:var(--yellow)">${ctl.toFixed(1)} <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.14em">CURRENT CTL</span></div>
      <div class="chart-wrap"><canvas id="ctlC"></canvas></div>
    </div>
    <div class="chart-block fade">
      <div class="chart-top"><div class="chart-title">HRV & BASELINE</div><div class="chart-legend"><div class="leg-item"><div class="leg-line" style="background:var(--blue)"></div>HRV</div><div class="leg-item"><div class="leg-line" style="background:rgba(91,156,246,.45);border-top:1px dashed"></div>7D AVG</div></div></div>
      <div class="chart-wrap"><canvas id="hrvC"></canvas></div>
      <div class="chart-footer">
        <div class="hrv-stats">
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--blue)">${hrv7>0?hrv7.toFixed(0):hrv.toFixed(0)}<span style="font-size:13px;color:var(--muted)"> ms</span></div><div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.12em;color:var(--sub);font-weight:600">7D AVERAGE</div></div>
          <div><span class="hrv-badge" style="background:${hrvR>=1?'#1a3a1a':'#3a1a1a'};color:${hrvR>=1?'var(--green)':'var(--orange)'}">${hrvR>=1?'OPTIMAL':'BELOW BASE'}</span></div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--sub)">RATIO: ${hrvR>0?hrvR.toFixed(2):'—'}</div>
      </div>
    </div>
    <div class="chart-block fade">
      <div class="chart-top"><div class="chart-title">RECOVERY BALANCE (TSB)</div><span style="color:${tsbF.col};font-size:14px">●</span></div>
      <div class="chart-wrap"><canvas id="tsbC"></canvas></div>
      <div class="chart-footer">
        <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.14em;color:var(--sub);font-weight:600;margin-bottom:5px">TRAINING STRESS BALANCE</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:${tsbF.col}">${tsb>=0?'+':''}${tsb.toFixed(1)} <span style="font-size:13px;font-weight:500;color:var(--sub)">${tsbF.label}</span></div></div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--sub)">LOAD: ${acwrL.label}</div>
      </div>
    </div>
    <div class="mini-grid fade">
      <div class="mini-card"><div class="mini-lbl">LOAD RATIO</div><div class="mini-val" style="color:${acwrL.col}">${acwr>0?acwr.toFixed(2):'—'}</div><div class="mini-tag" style="color:${acwrL.col}">▲ ${acwrL.label}</div></div>
      <div class="mini-card"><div class="mini-lbl">REST HR</div><div class="mini-val">${rhr>0?rhr.toFixed(0):'—'}<span class="mini-unit">${rhr>0?'BPM':''}</span></div><div class="mini-tag" style="color:var(--blue)">● STABLE</div></div>
      <div class="mini-card"><div class="mini-lbl">CTL FITNESS</div><div class="mini-val" style="color:var(--yellow)">${ctl.toFixed(1)}</div></div>
      <div class="mini-card"><div class="mini-lbl">HRV RATIO</div><div class="mini-val" style="color:${hrvR>=1?'var(--green)':'var(--orange)'}">${hrvR>0?hrvR.toFixed(2):'—'}</div><div class="mini-tag" style="color:${hrvR>=1?'var(--green)':'var(--orange)'}">● ${hrvR>=1?'OPTIMAL':'CAUTION'}</div></div>
    </div>
    <div style="height:12px"></div>`;

  requestAnimationFrame(()=>{
    mkChart('ctlC',[
      {label:'CTL',data:ctlD,borderColor:'#f5d020',backgroundColor:'rgba(245,208,32,.07)',borderWidth:2,pointRadius:0,tension:.4,fill:true},
      {label:'ATL',data:atlD,borderColor:'#5b9cf6',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.4},
    ],labels);
    mkChart('hrvC',[
      {label:'HRV',data:hrvD,borderColor:'#5b9cf6',backgroundColor:'rgba(91,156,246,.09)',borderWidth:2,pointRadius:0,tension:.4,fill:true,spanGaps:true},
      {label:'7D',data:hrv7D,borderColor:'rgba(91,156,246,.45)',backgroundColor:'transparent',borderWidth:1,pointRadius:0,tension:.4,borderDash:[4,4],spanGaps:true},
    ],labels);
    mkChart('tsbC',[
      {label:'TSB',data:tsbD,borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,.08)',borderWidth:2,pointRadius:0,tension:.4,fill:true},
    ],labels,Math.min(...tsbD.filter(v=>v!=null))*1.1);
  });
}
init();

</script>
</body>
</html>
